/* ---------- moteur : LE DÉCOUPLEUR (indépendance des mains) ----------
   L'app joue le vamp main gauche (le pouls) ; l'élève tape les rythmes main
   droite sur un pad, jugés contre l'horloge AUDIO (±200 ms). Cinq niveaux de
   superposition : avec le pouls → backbeat → blanches → contretemps → syncope. */
const DC_LEVELS=[
  {name:'Avec la gauche',   desc:'Tape sur CHAQUE temps, pile avec la basse. Les deux mains disent la même chose — c\'est le point de départ.', hits:[0,1,2,3]},
  {name:'Le backbeat',      desc:'Temps 2 et 4 seulement. Ta droite claque là où la batterie mettrait la caisse claire.', hits:[1,3]},
  {name:'Les blanches',     desc:'Temps 1 et 3 : moins de notes que la gauche. Résiste à l\'aspiration du pouls.', hits:[0,2]},
  {name:'Les contretemps',  desc:'Uniquement ENTRE les basses — les « et ». Le niveau qui fabrique l\'indépendance. Dis « 1 ET 2 ET » à voix haute.', hits:[.5,1.5,2.5,3.5]},
  {name:'La syncope',       desc:'1, « et » de 2, 4. Ta première vraie phrase rythmique par-dessus le vamp — le son des disques.', hits:[0,1.5,3]}
];
/* logique pure du jugement : chaque cible consomme la frappe la plus proche
   dans la fenêtre ; le reste des frappes = « en trop ». Testable à sec. */
function dcJudge(expected,taps,WIN){
  taps=[...taps]; let good=0;
  expected.forEach(t=>{
    let bi=-1,bd=WIN;
    taps.forEach((tt,i)=>{ const d=Math.abs(tt-t); if(d<=bd){ bd=d; bi=i; } });
    if(bi>=0){ good++; taps.splice(bi,1); }
  });
  return {good, extras:taps.length, total:expected.length,
          pass: good>=Math.ceil(expected.length*.8)&&taps.length<=2};
}
function runDecouple(el,ex,cb){
  const bpm=ex.bpm||66, beat=60/bpm, BARS=4, WIN=.2;
  const prog=[{root:9,type:'min'},{root:7},{root:5},{root:7}];
  let lvl=0, D=null;
  const html=()=>{
    const L=DC_LEVELS[lvl];
    el.innerHTML=`<div class="exhead"><div class="target">Niveau ${lvl+1}/${DC_LEVELS.length} — ${L.name}</div>
      <div class="sub">${L.desc}</div></div>
      <div id="dcGrid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin:14px 0">
        ${[0,.5,1,1.5,2,2.5,3,3.5].map(p=>`<div data-p="${p}" style="text-align:center;padding:10px 2px;border-radius:9px;font-weight:800;font-size:13px;
          background:${L.hits.includes(p)?'var(--accent2)':'var(--bg3)'};color:${L.hits.includes(p)?'#1a1200':'var(--dim)'};
          border:1px solid ${L.hits.includes(p)?'var(--accent)':'var(--line)'}">${p%1===0?(p+1):'&'}</div>`).join('')}
      </div>
      <div class="fb" id="dcFb" style="min-height:22px"></div>
      <button class="btn" id="dcGo">▶ C'est parti — 1 mesure de décompte, 4 mesures jugées</button>
      <button id="dcPad" style="display:block;width:100%;margin-top:10px;padding:34px 0;border-radius:16px;border:2px solid var(--accent);
        background:var(--bg2);color:var(--accent);font-size:19px;font-weight:900;cursor:pointer;-webkit-user-select:none;user-select:none">🖐️ TAPE ICI<br><span style="font-size:11px;font-weight:700;color:var(--dim)">ta main droite, sur les cases orange</span></button>`;
    el.querySelector('#dcGo').onclick=start;
    const pad=el.querySelector('#dcPad');
    pad.addEventListener('pointerdown',e=>{ e.preventDefault(); tap(); });
  };
  const start=()=>{
    const ctx=ac(), L=DC_LEVELS[lvl];
    const t0=ctx.currentTime+.25+4*beat;                 // début du jugement (après 1 mesure de décompte)
    // décompte : 4 clics
    for(let b=0;b<4;b++) Metro.click(ctx.currentTime+.25+b*beat, b===0);
    // vamp main gauche : 4 mesures d'octaves pulsées
    prog.forEach((ch,bar)=>{ const bass=36+(ch.root%12);
      for(let b=0;b<4;b++){ const tt=t0-ctx.currentTime+bar*4*beat+b*beat;
        playNote(bass,beat*.85,.46,tt); playNote(bass+12,beat*.85,.3,tt+.012); } });
    // cibles attendues sur l'horloge audio
    const expected=[];
    for(let bar=0;bar<BARS;bar++) L.hits.forEach(p=>expected.push(t0+(bar*4+p)*beat));
    D={t0,expected,taps:[],raf:null,end:t0+BARS*4*beat+WIN+.05};
    const fb=el.querySelector('#dcFb'); fb.textContent='Décompte…'; fb.className='fb';
    const go=el.querySelector('#dcGo'); go.disabled=true;
    // le verdict est planifié en temps, PAS dans la boucle d'affichage :
    // un rAF suspendu (onglet en fond, écran verrouillé) ne doit pas avaler le jugement
    setTimeout(()=>{ if(D&&el.isConnected) judge(); },(D.end-ctx.currentTime)*1000+120);
    setTimeout(()=>{ if(D&&el.isConnected&&fb.isConnected) fb.textContent='Joue !'; },(t0-ctx.currentTime)*1000);
    const loop=()=>{ if(!D||!el.isConnected) return;
      const now=ctx.currentTime, pos=(now-D.t0)/beat;
      el.querySelectorAll('#dcGrid div').forEach(c=>{
        const p=+c.dataset.p, inBar=((pos%4)+4)%4;
        c.style.outline=(pos>=0&&Math.abs(inBar-p)<.25)?'2px solid var(--txt)':'none';
      });
      D.raf=requestAnimationFrame(loop);
    };
    loop();
  };
  const tap=()=>{
    playNote(69,.5,.45);
    if(!D) return;
    D.taps.push(ac().currentTime);
    const pad=el.querySelector('#dcPad');
    pad.style.background='var(--accent2)'; setTimeout(()=>{ if(pad.isConnected) pad.style.background='var(--bg2)'; },90);
  };
  const judge=()=>{
    const v=dcJudge(D.expected,D.taps,WIN);
    const good=v.good, extras=v.extras, total=v.total, pass=v.pass;
    D=null;
    const fb=el.querySelector('#dcFb');
    if(pass){
      tada();
      if(lvl>=DC_LEVELS.length-1){
        el.innerHTML=`<div class="exhead"><div class="target">🥋 ${good}/${total}</div>
          <div class="sub">Cinq niveaux de superposition tenus. Ce que tu appelles « séparer les mains » vient de se produire : ta gauche est un pilote automatique, ta droite parle par-dessus. Transfère au vrai piano ce soir — mêmes niveaux, mêmes règles.</div></div>`;
        setTimeout(()=>cb(true),1400);
      } else {
        lvl++;
        fb.textContent='';
        el.querySelector('#dcGo').disabled=false;
        html();
        el.querySelector('#dcFb').innerHTML=`<span style="color:var(--good)">✓ ${good}/${total}${extras?` (${extras} en trop)`:''} — niveau suivant.</span>`;
      }
    } else {
      buzz();
      html();
      el.querySelector('#dcFb').innerHTML=`<span style="color:var(--bad)">✗ ${good}/${total} dans la fenêtre${extras?`, ${extras} tape${extras>1?'s':''} en trop`:''}.</span> ${good<total*.5?'Compte à VOIX HAUTE (« 1 et 2 et… ») — la bouche synchronise les mains.':'Presque. Écoute la basse, ne la regarde pas.'}`;
    }
  };
  html();
}

/* logique pure du mode « À toi de jouer » : une frappe → une décision.
   st={pos,wrong,done} muté ; renvoie l'action à jouer côté UI. */
function practiceTap(st, seq, midi){
  if(st.done) return {a:'free'};
  const exp=seq[st.pos].midi;
  if(midi===exp){
    st.pos++;
    if(st.pos>=seq.length){ st.done=true; return {a:'finish'}; }
    return {a:'ok'};
  }
  st.wrong++;
  return {a:'bad', exp};
}

/* ---------------- moteur play-along ---------------- */
const Player = {
  song:null, hands:'both', rate:1, loop:false, click:false, playing:false,
  ctx:null, timer:null, raf:null, anchorTime:0, anchorBeat:0, ai:0, spb:0,
  ae:[], melTL:[], chTL:[], total:0, kb:null, els:{}, onEnd:null, awarded:false,
  build(){
    const s=this.song;
    this.melTL=[]; let t=0;
    s.mel.forEach(([m,d])=>{ if(m!=null) this.melTL.push({t0:t,t1:t+d,midi:m}); t+=d; });
    const melBeats=t;
    this.chTL=[]; t=0;
    s.ch.forEach(([root,type])=>{ this.chTL.push({t0:t,t1:t+s.ts,root,type,label:chordName(root,type),notes:chordNotes(root,type)}); t+=s.ts; });
    const chBeats=t;
    this.total=Math.max(melBeats,chBeats)||chBeats;
    /* événements audio */
    const ae=[];
    if(this.hands!=='accomp') this.melTL.forEach(e=>ae.push({t:e.t0, midi:e.midi, dur:e.t1-e.t0, vel:.42}));
    if(this.hands!=='melody') this.chTL.forEach(c=>{
      /* basse : temps 1 (+ quinte au temps 3 en 4/4) */
      ae.push({t:c.t0, midi:36+c.root, dur:s.ts*.7, vel:.4});
      if(s.ts>=4) ae.push({t:c.t0+2, midi:36+((c.root+7)%12), dur:1.8, vel:.34});
      /* accord : 1 & 3 en binaire, « pah-pah » sur 2 & 3 en valse (3/4) */
      const compBeats = s.ts>=4 ? [0,2] : (s.ts===3 ? [1,2] : [0]);
      voicingFor(c.root,c.type).forEach(m=> compBeats.forEach(bt=> ae.push({t:c.t0+bt, midi:m, dur:1.3, vel:.15})));
    });
    if(this.click) for(let b=0;b<this.total;b++) ae.push({t:b, click:true, accent:b%s.ts===0});
    ae.sort((a,b)=>a.t-b.t);
    this.ae=ae;
  },
  start(){
    if(this.timer){ clearInterval(this.timer); this.timer=null; }
    if(this.raf){ cancelAnimationFrame(this.raf); this.raf=null; }
    this.playing=false; this._lastStrip=-1;
    this.build();
    const ctx=ac(); this.ctx=ctx;
    this.spb=60/(this.song.bpm*this.rate);
    /* décompte : une mesure de clics avant le morceau */
    const t0=ctx.currentTime+.14, ci=this.song.ts;
    for(let i=0;i<ci;i++) Metro.click(t0+i*this.spb, i===0);
    this.anchorTime=t0+ci*this.spb; this.anchorBeat=0; this.ai=0;
    this.playing=true; this.awarded=false;
    this.timer=setInterval(()=>this._sched(),25);
    this._frame();
    if(this.els.play) this.els.play.textContent='⏸ Stop';
  },
  _sched(){
    if(!this.playing) return;
    const ctx=this.ctx, look=.13, spb=this.spb;
    while(this.ai<this.ae.length){
      const ev=this.ae[this.ai], when=this.anchorTime+(ev.t-this.anchorBeat)*spb;
      if(when<ctx.currentTime+look){
        if(when>ctx.currentTime-.06){
          if(ev.click) Metro.click(when, ev.accent);
          else playNote(ev.midi, Math.max(.14,ev.dur*spb*.9), ev.vel, when-ctx.currentTime);
        }
        this.ai++;
      } else return;
    }
    const endT=this.anchorTime+(this.total-this.anchorBeat)*spb;
    if(ctx.currentTime>=endT-.02){
      if(this.loop){ this.anchorBeat=0; this.anchorTime=endT; this.ai=0; }
      else this.stop(true);
    }
  },
  _frame(){
    if(!this.playing) return;
    const beat=(this.ctx.currentTime-this.anchorTime)/this.spb+this.anchorBeat;
    const counting=beat<0;
    const bb=counting?0:(this.loop ? (beat%this.total) : Math.min(beat,this.total-.0001));
    if(this.kb){
      this.kb.clearSel();
      const chord=this.chTL.find(e=>bb>=e.t0&&bb<e.t1)||this.chTL[this.chTL.length-1];
      if(chord){
        [36+chord.root, ...voicingFor(chord.root,chord.type)].forEach(m=>{ const k=this.kb.keyEl(m); if(k) k.classList.add('hint'); });
        this._strip(this.chTL.indexOf(chord));
        if(this.els.cn){
          if(counting){ this.els.cn.textContent='· '+Math.max(1,Math.ceil(-beat))+' ·'; this.els.nn.textContent='Prêt…'; }
          else { this.els.cn.textContent=chord.label; this.els.nn.textContent=chord.notes; }
        }
      }
      if(!counting && this.hands!=='accomp'){
        const cur=this.melTL.find(e=>bb>=e.t0&&bb<e.t1);
        if(cur){ const k=this.kb.keyEl(cur.midi); if(k){ k.classList.remove('hint'); k.classList.add('sel'); } }
      }
    }
    if(this.els.bar) this.els.bar.style.width=Math.min(100,Math.max(0,beat)/this.total*100)+'%';
    this.raf=requestAnimationFrame(()=>this._frame());
  },
  _strip(idx){
    if(this._lastStrip===idx || !this.els.strip) return;
    this._lastStrip=idx;
    const chips=this.els.strip.children;
    for(let i=0;i<chips.length;i++) chips[i].classList.toggle('cur',i===idx);
    const cur=chips[idx]; if(cur) cur.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  },
  stop(natural){
    const wasPlaying=this.playing;
    this.playing=false;
    if(this.timer){ clearInterval(this.timer); this.timer=null; }
    if(this.raf){ cancelAnimationFrame(this.raf); this.raf=null; }
    if(this.kb) this.kb.clearSel();
    this._lastStrip=-1;
    if(this.els.play) this.els.play.textContent='▶ Jouer';
    if(!wasPlaying || !this.song) return;
    const played=(this.ctx.currentTime-this.anchorTime)/this.spb+this.anchorBeat;
    if(this.song.jam){
      if(played>=8 && !this.awarded){ this.awarded=true; award(8); toast('🎶 Jam validé · +8 XP'); }
    } else if(natural){
      const id=this.song.id, first=!S.songs[id];
      S.songs[id]=(S.songs[id]||0)+1; save();
      award(first?15:5); chime();
      toast(first?'🎉 Morceau joué en entier · +15 XP':'↻ Rejoué · +5 XP');
      if(this.els.bar) this.els.bar.style.width='100%';
    }
    if(this.onEnd) this.onEnd();
  }
};

/* ---------------- vue liste ---------------- */
function renderMorceaux(){
  main.innerHTML=`<h1 class="page">Morceaux</h1>
  <p style="color:var(--dim);font-size:14px;margin:-6px 0 14px">La théorie, ça se joue. L'app tient le tempo et t'allume les touches — tes doigts suivent. Ralentis, coupe une main, boucle : c'est toi qui mènes.</p>`;
  const melodies=SONGS.filter(s=>!s.jam), jams=SONGS.filter(s=>s.jam);
  const section=(titre,list)=>{
    const h=document.createElement('h2');
    h.style.cssText='font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin:6px 0 8px;padding-left:4px';
    h.textContent=titre; main.appendChild(h);
    list.forEach(s=>{
      const [cls,lbl]=diffLabel(s);
      const played=(S.songs||{})[s.id], lh=(S.songsLH||{})[s.id];
      const el=document.createElement('div'); el.className='songitem';
      el.innerHTML=`<div class="ico">${s.ico}</div>
        <div class="t"><b>${s.title}</b><small>${s.sub}</small></div>
        ${played||lh?`<div class="played">${played?'✓ '+played+'×':''}${lh?' 🫲':''}</div>`:''}
        <div class="df ${cls}">${lbl}</div>`;
      el.onclick=()=>openSong(s);
      main.appendChild(el);
    });
  };
  section('Mélodies à jouer',melodies);
  section('Grilles à improviser',jams);
}

/* ---------------- vue lecteur ---------------- */
function openSong(song){
  openCustom(song.title,(inner)=>{
    Player.song=song; Player.hands= song.jam?'accomp':'both'; Player.rate=1; Player.loop=!!song.jam; Player.click=false; Player.els={}; Player.kb=null;
    /* plage clavier calée sur les notes réellement jouées */
    let lo=127, hi=0;
    (song.mel||[]).forEach(([m])=>{ if(m!=null){ lo=Math.min(lo,m); hi=Math.max(hi,m); } });
    song.ch.forEach(([r,t])=>{ [36+r, ...voicingFor(r,t)].forEach(m=>{ lo=Math.min(lo,m); hi=Math.max(hi,m); }); });
    lo=Math.max(24, (Math.floor(lo/12)*12)); hi=Math.min(84, (Math.ceil((hi+1)/12)*12));

    const info=document.createElement('p');
    info.style.cssText='color:var(--dim);font-size:13px;margin:-4px 0 4px;text-align:center';
    info.innerHTML=`${song.key} · ${song.bpm} BPM${song.jam?' · grille en boucle':''}`;
    inner.appendChild(info);

    const now=document.createElement('div'); now.className='nowchord';
    now.innerHTML=`<div class="cn" id="pcn">—</div><div class="nn" id="pnn">Appuie sur Jouer</div>`;
    inner.appendChild(now);

    const strip=document.createElement('div'); strip.className='strip';
    song.ch.forEach(([r,t])=>{ const c=document.createElement('div'); c.className='cc'; c.textContent=chordName(r,t); strip.appendChild(c); });
    inner.appendChild(strip);

    /* séquence de mélodie pour le mode interactif (notes non-silence, dans l'ordre) */
    const iSeq=[]; { let t=0; (song.mel||[]).forEach(([m,d])=>{ if(m!=null) iSeq.push({midi:m, t0:t}); t+=d; }); }
    const chordAt = t0 => song.ch[Math.min(song.ch.length-1, Math.floor(t0/song.ts))];

    let mode='demo';   // 'demo' | 'play' | 'lh'
    const P={ pos:0, wrong:0, done:false };

    /* séquence main gauche : une étape par mesure — la basse d'abord, puis l'accord */
    const lhSeq=[]; if(!song.jam){ let t=0; song.ch.forEach(([r,ty])=>{ lhSeq.push({t0:t, root:r, type:ty, label:chordName(r,ty), bass:36+r, voi:voicingFor(r,ty)}); t+=song.ts; }); }
    const melOfMeasure=i=>{ const t0=lhSeq[i].t0, t1=t0+song.ts; const out=[]; let t=0; (song.mel||[]).forEach(([m,d])=>{ if(m!=null&&t>=t0&&t<t1) out.push({midi:m,off:t-t0,dur:d}); t+=d; }); return out; };
    const L={ idx:0, gotBass:false, need:[], wrong:0, done:false };

    /* le clavier route le tap selon le mode courant */
    const kb=buildKeyboard(lo,hi,(m,k)=>{
      if(mode==='play' && !P.done){ tapPlay(m,k); return; }
      if(mode==='lh' && !L.done){ tapLH(m,k); return; }
      playNote(m); k.classList.add('flash'); setTimeout(()=>k.classList.remove('flash'),180);
    });
    inner.appendChild(kb);
    const cn=now.querySelector('#pcn'), nn=now.querySelector('#pnn');

    if(song.hint){
      const hint=document.createElement('div'); hint.className='theory';
      hint.innerHTML=`<div class="tip" style="margin:12px 0">💡 ${song.hint}</div>`;
      inner.appendChild(hint);
    }

    /* ---- sélecteur de mode (mélodies uniquement) ---- */
    let seg=null;
    if(!song.jam && iSeq.length){
      seg=document.createElement('div'); seg.className='modeseg';
      seg.innerHTML=`<button data-m="demo" class="on">🎧 Démo</button><button data-m="play">🎹 Mélodie</button><button data-m="lh">🫲 Main gauche</button>`;
      seg.querySelectorAll('button').forEach(b=>b.onclick=()=>setMode(b.dataset.m));
      inner.appendChild(seg);
    }

    /* ================= BLOC DÉMO ================= */
    const demoBox=document.createElement('div');
    const tempo=document.createElement('div'); tempo.className='tempo';
    tempo.innerHTML=`<span class="tl">Tempo</span><input type="range" min="50" max="110" step="5" value="100"><span class="tv">100 %</span>`;
    demoBox.appendChild(tempo);
    const slider=tempo.querySelector('input'), tv=tempo.querySelector('.tv');
    slider.oninput=()=>{ Player.rate=+slider.value/100; tv.textContent=slider.value+' %'; if(Player.playing) Player.start(); };

    const opts=document.createElement('div'); opts.className='selrow'; opts.style.marginTop='2px';
    if(!song.jam){
      [['both','Deux mains'],['melody','Mélodie'],['accomp','Accompagnement']].forEach(([v,l])=>{
        const t=document.createElement('div'); t.className='tag'+(Player.hands===v?' on':''); t.textContent=l;
        t.onclick=()=>{ Player.hands=v; opts.querySelectorAll('.tag[data-h]').forEach(x=>x.classList.remove('on')); t.classList.add('on'); if(Player.playing) Player.start(); };
        t.dataset.h=v; opts.appendChild(t);
      });
    }
    const lp=document.createElement('div'); lp.className='tag'+(Player.loop?' on':''); lp.textContent='🔁 Boucle';
    lp.onclick=()=>{ Player.loop=!Player.loop; lp.classList.toggle('on',Player.loop); };
    opts.appendChild(lp);
    const cl=document.createElement('div'); cl.className='tag'+(Player.click?' on':''); cl.textContent='🥁 Clic';
    cl.onclick=()=>{ Player.click=!Player.click; cl.classList.toggle('on',Player.click); if(Player.playing) Player.start(); };
    opts.appendChild(cl);
    demoBox.appendChild(opts);

    const pb=document.createElement('div'); pb.className='pbar'; pb.innerHTML='<i></i>'; demoBox.appendChild(pb);
    const play=document.createElement('button'); play.className='btn'; play.textContent='▶ Jouer';
    play.onclick=()=>{ if(Player.playing) Player.stop(false); else Player.start(); };
    demoBox.appendChild(play);
    inner.appendChild(demoBox);

    /* ================= BLOC « À TOI DE JOUER » ================= */
    const playBox=document.createElement('div'); playBox.style.display='none';
    const ipb=document.createElement('div'); ipb.className='pbar'; ipb.innerHTML='<i></i>'; playBox.appendChild(ipb);
    const ibar=ipb.querySelector('i');
    const fb=document.createElement('div'); fb.className='fb'; playBox.appendChild(fb);
    const irow=document.createElement('div'); irow.className='exrow';
    const hearBtn=document.createElement('button'); hearBtn.className='btn ghost'; hearBtn.textContent='👂 Entendre';
    const againBtn=document.createElement('button'); againBtn.className='btn ghost'; againBtn.textContent='↺ Recommencer';
    irow.appendChild(hearBtn); irow.appendChild(againBtn);
    playBox.appendChild(irow);
    inner.appendChild(playBox);

    hearBtn.onclick=()=>{ if(!P.done && iSeq[P.pos]) playNote(iSeq[P.pos].midi,1.1,.4); };
    againBtn.onclick=()=>{ P.pos=0; P.wrong=0; P.done=false; fb.className='fb'; fb.textContent=''; showStep(); };

    /* ================= BLOC « MAIN GAUCHE » ================= */
    const lhBox=document.createElement('div'); lhBox.style.display='none';
    const lpb=document.createElement('div'); lpb.className='pbar'; lpb.innerHTML='<i></i>'; lhBox.appendChild(lpb);
    const lbar=lpb.querySelector('i');
    const lfb=document.createElement('div'); lfb.className='fb'; lhBox.appendChild(lfb);
    const lrow=document.createElement('div'); lrow.className='exrow';
    const lHear=document.createElement('button'); lHear.className='btn ghost'; lHear.textContent='👂 Entendre l\'accord';
    const lAgain=document.createElement('button'); lAgain.className='btn ghost'; lAgain.textContent='↺ Recommencer';
    lrow.appendChild(lHear); lrow.appendChild(lAgain);
    lhBox.appendChild(lrow);
    inner.appendChild(lhBox);

    lHear.onclick=()=>{ const c=lhSeq[L.idx]; if(!L.done && c) playChord([c.bass,...c.voi],1.6); };
    lAgain.onclick=()=>{ L.idx=0; L.wrong=0; L.done=false; lfb.className='fb'; lfb.textContent=''; showLH(); };

    function showLH(){
      kb.clearSel();
      const c=lhSeq[L.idx]; if(!c) return;
      L.gotBass=false; L.need=[...c.voi];
      const bk=kb.keyEl(c.bass); if(bk) bk.classList.add('sel','target');
      c.voi.forEach(m=>{ const k=kb.keyEl(m); if(k) k.classList.add('hint'); });
      cn.textContent=c.label;
      nn.textContent=`Mesure ${L.idx+1}/${lhSeq.length} · la basse d'abord (touche qui pulse), puis l'accord`;
      lbar.style.width=(L.idx/lhSeq.length*100)+'%';
    }
    function tapLH(m,k){
      const c=lhSeq[L.idx];
      if(!L.gotBass){
        if(m===c.bass){
          L.gotBass=true; playNote(m,1.2,.5);
          k.classList.remove('target'); k.classList.add('flash'); setTimeout(()=>k.classList.remove('flash'),150);
          lfb.className='fb'; lfb.textContent='';
          nn.textContent=`Mesure ${L.idx+1}/${lhSeq.length} · maintenant l'accord — ${c.voi.length} notes, l'ordre est libre`;
        } else {
          L.wrong++; buzz(); k.classList.add('wrong'); setTimeout(()=>k.classList.remove('wrong'),260);
          lfb.className='fb bad'; lfb.textContent='La basse d\'abord : '+NOTE_FR[c.bass%12]+', tout en bas — c\'est elle qui pose l\'accord.';
        }
        return;
      }
      const i=L.need.indexOf(m);
      if(i>-1){
        L.need.splice(i,1); playNote(m,.9,.4);
        k.classList.remove('hint'); k.classList.add('flash'); setTimeout(()=>k.classList.remove('flash'),150);
        if(!L.need.length) measureDoneLH();
      } else if(c.voi.includes(m)){ playNote(m,.5,.25); }
      else {
        L.wrong++; buzz(); k.classList.add('wrong'); setTimeout(()=>k.classList.remove('wrong'),260);
        lfb.className='fb bad'; lfb.textContent='Pas dans '+c.label+' — reste sur les touches allumées.';
      }
    }
    function measureDoneLH(){
      /* la récompense : ta main gauche tient, l'app chante la mélodie de la mesure par-dessus */
      const c=lhSeq[L.idx], spb=60/song.bpm;
      playNote(c.bass, song.ts*spb*.9, .4);
      c.voi.forEach(m=>playNote(m, song.ts*spb*.8, .2));
      const mel=melOfMeasure(L.idx);
      mel.forEach(n=>playNote(n.midi, Math.max(.18,n.dur*spb*.9), .45, n.off*spb));
      lfb.className='fb ok';
      lfb.textContent=mel.length ? '✓ '+c.label+' — écoute la mélodie se poser sur TA main gauche' : '✓ '+c.label;
      L.idx++;
      setTimeout(()=>{ if(L.idx<lhSeq.length) showLH(); else finishLH(); }, Math.max(900, song.ts*spb*950));
    }
    function finishLH(){
      L.done=true; kb.clearSel();
      const id=song.id, first=!(S.songsLH=S.songsLH||{})[id];
      S.songsLH[id]=(S.songsLH[id]||0)+1; save();
      const xp=first?25:10; award(xp); chime(); tada();
      cn.textContent='✓';
      nn.textContent=L.wrong?`Grille bouclée · ${L.wrong} erreur${L.wrong>1?'s':''}`:'Grille bouclée sans faute. Ta main gauche sait où elle va.';
      lfb.className='fb ok'; lfb.textContent=(first?'🫲 Première grille à la main gauche · +':'↺ Rejouée · +')+xp+' XP';
      lbar.style.width='100%';
      toast(first?'🫲 Main gauche autonome sur '+song.title+' · +25 XP':'↺ Main gauche rejouée · +10 XP');
    }

    function showStep(){
      kb.clearSel();
      const cur=iSeq[P.pos]; if(!cur) return;
      const [root,type]=chordAt(cur.t0);
      [36+root, ...voicingFor(root,type)].forEach(m=>{ const k=kb.keyEl(m); if(k) k.classList.add('hint'); });
      const tk=kb.keyEl(cur.midi); if(tk){ tk.classList.remove('hint'); tk.classList.add('sel','target'); }
      cn.textContent=NOTE_FR[cur.midi%12];
      nn.textContent=`Note ${P.pos+1}/${iSeq.length} · sous ${chordName(root,type)}`;
      ibar.style.width=(P.pos/iSeq.length*100)+'%';
    }
    function tapPlay(m,k){
      const r=practiceTap(P,iSeq,m);
      if(r.a==='ok'){
        playNote(m); k.classList.add('flash'); setTimeout(()=>k.classList.remove('flash'),150);
        fb.className='fb'; showStep();
      } else if(r.a==='finish'){
        playNote(m); k.classList.add('flash'); setTimeout(()=>k.classList.remove('flash'),150);
        finishPlay();
      } else if(r.a==='bad'){
        buzz(); k.classList.add('wrong'); setTimeout(()=>k.classList.remove('wrong'),260);
        fb.className='fb bad'; fb.textContent='Pas celle-là — c\'est '+NOTE_FR[r.exp%12];
      }
    }
    function finishPlay(){
      P.done=true; kb.clearSel();
      const id=song.id, firstHand=!S.songsHand[id];
      S.songs[id]=(S.songs[id]||0)+1; S.songsHand[id]=true; save();
      const xp=firstHand?20:10; award(xp);
      chime(); tada();
      cn.textContent='✓'; nn.textContent = P.wrong ? `Fini · ${P.wrong} erreur${P.wrong>1?'s':''}` : 'Sans faute. Chapeau.';
      fb.className='fb ok'; fb.textContent = firstHand ? '🎉 Joué de tes mains · +'+xp+' XP' : '↺ Rejoué à la main · +'+xp+' XP';
      ibar.style.width='100%';
      toast(firstHand?'🎹 Premier passage à la main · +20 XP':'↺ Rejoué · +10 XP');
    }

    function setMode(m){
      if(m===mode) return;
      Player.stop(false); mode=m;
      if(seg) seg.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
      kb.clearSel();
      if(m==='play'){
        demoBox.style.display='none'; lhBox.style.display='none'; playBox.style.display='block';
        P.pos=0; P.wrong=0; P.done=false; fb.className='fb'; fb.textContent='';
        tip.textContent='Appuie sur la touche qui pulse. L\'app avance quand c\'est juste. Aucun chrono : prends ton temps.';
        showStep();
      } else if(m==='lh'){
        demoBox.style.display='none'; playBox.style.display='none'; lhBox.style.display='block';
        L.idx=0; L.wrong=0; L.done=false; lfb.className='fb'; lfb.textContent='';
        tip.textContent='Tu ES l\'accompagnement : basse puis accord, mesure par mesure. Quand c\'est juste, l\'app chante la mélodie par-dessus ta main.';
        showLH();
      } else {
        playBox.style.display='none'; lhBox.style.display='none'; demoBox.style.display='block';
        cn.textContent='—'; nn.textContent='Appuie sur Jouer';
        tip.textContent = 'Regarde les touches s\'allumer, écoute, puis rejoue. Ralentis tant que ce n\'est pas propre.';
      }
    }

    const tip=document.createElement('p');
    tip.style.cssText='color:var(--dim);font-size:12px;text-align:center;margin-top:10px';
    tip.textContent = song.jam ? 'L\'app joue la basse et les accords : pose ta main droite par-dessus et improvise.'
      : 'Regarde les touches s\'allumer, écoute, puis rejoue. Ralentis tant que ce n\'est pas propre.';
    inner.appendChild(tip);

    Player.kb=kb;
    Player.els={ cn, nn, strip, bar:pb.querySelector('i'), play };
    Player.onEnd=()=>{};
  });
}

/* ---------------- init ---------------- */
updateHeader(); render();
</script>
