<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Piano Dojo">
<link rel="manifest" href='data:application/manifest+json,{"name":"Piano Dojo","short_name":"PianoDojo","display":"standalone","background_color":"#0d0f14","theme_color":"#0d0f14","start_url":"."}'>
<title>Piano Dojo</title>
<style>
  :root{
    --bg:#0d0f14; --bg2:#151823; --bg3:#1d2130; --line:#2a2f42;
    --txt:#e8eaf2; --dim:#8b91a7; --acc:#f5b840; --acc2:#e0891f;
    --ok:#3ecf7a; --bad:#ff5c6c; --blue:#5b9cff; --purple:#a78bfa;
    --r:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    overscroll-behavior:none; user-select:none;-webkit-user-select:none;
  }
  #app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  main{flex:1;padding:16px 16px 90px}

  /* ---------- header ---------- */
  header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
  .logo{font-weight:800;font-size:18px;letter-spacing:.5px}
  .logo span{color:var(--acc)}
  .streak{font-weight:700;font-size:14px;background:var(--bg2);border:1px solid var(--line);
    padding:6px 12px;border-radius:20px}

  /* ---------- cards ---------- */
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .hero{background:linear-gradient(135deg,#1a1e2e,#232840);border:1px solid var(--line)}
  .hero .lvl{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  .hero .lvlname{font-size:22px;font-weight:800;margin:2px 0 10px;color:var(--acc)}
  .xpbar{height:8px;background:#0009;border-radius:4px;overflow:hidden}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc));border-radius:4px;transition:width .4s}
  .hero .xptxt{font-size:12px;color:var(--dim);margin-top:6px}

  .btn{display:inline-block;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;
    cursor:pointer;background:var(--acc);color:#1a1200;width:100%;text-align:center;margin-top:12px}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--bg3);color:var(--txt);border:1px solid var(--line)}
  .btn.small{width:auto;padding:9px 16px;font-size:13px;margin-top:0}
  .btn.ok{background:var(--ok);color:#02180b}
  .btn:disabled{opacity:.4;pointer-events:none}

  /* ---------- module list ---------- */
  .mod{margin-bottom:20px}
  .mod h2{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;padding-left:4px}
  .lesson{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);
    border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer}
  .lesson:active{background:var(--bg3)}
  .lesson.locked{opacity:.38;pointer-events:none}
  .lesson .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:18px;background:var(--bg3);flex-shrink:0}
  .lesson.done .ico{background:#153524;color:var(--ok)}
  .lesson .t{flex:1;min-width:0}
  .lesson .t b{display:block;font-size:15px}
  .lesson .t small{color:var(--dim);font-size:12px}
  .lesson .xp{font-size:12px;font-weight:700;color:var(--acc);flex-shrink:0}
  .lesson.done .xp{color:var(--ok)}

  /* ---------- overlay (lesson view) ---------- */
  .overlay{position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;display:none}
  .overlay.open{display:block}
  .overlay .inner{max-width:520px;margin:0 auto;padding:16px 16px 40px}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;position:sticky;top:0;background:var(--bg);padding:12px 0;z-index:5}
  .topbar .back{width:38px;height:38px;border-radius:11px;background:var(--bg2);border:1px solid var(--line);
    color:var(--txt);font-size:18px;cursor:pointer}
  .topbar b{font-size:16px}

  .theory{line-height:1.55;font-size:15px}
  .theory h3{color:var(--acc);font-size:16px;margin:18px 0 6px}
  .theory p{margin-bottom:10px;color:#c9cde0}
  .theory ul{margin:0 0 10px 18px;color:#c9cde0}
  .theory li{margin-bottom:5px}
  .theory .tip{background:#1a2438;border-left:3px solid var(--blue);padding:10px 12px;border-radius:0 10px 10px 0;
    margin:12px 0;font-size:14px;color:#c9d6f0}
  .theory .warn{background:#2e1a20;border-left:3px solid var(--bad);padding:10px 12px;border-radius:0 10px 10px 0;
    margin:12px 0;font-size:14px;color:#f0c9ce}
  .theory .formula{background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:12px;
    text-align:center;font-weight:800;font-size:17px;margin:12px 0;letter-spacing:.5px}
  .theory kbd{background:var(--bg3);border:1px solid var(--line);border-radius:6px;padding:1px 7px;
    font-family:inherit;font-weight:700;color:var(--acc)}

  /* ---------- keyboard ---------- */
  .kbdwrap{margin:14px 0;touch-action:none}
  .kbd{position:relative;height:170px;border-radius:10px;overflow:hidden;background:#000}
  .key{position:absolute;top:0;cursor:pointer}
  .key.white{height:100%;background:linear-gradient(#fdfdfd,#e8e8ec);border:1px solid #999;border-radius:0 0 6px 6px;z-index:1}
  .key.black{height:60%;background:linear-gradient(#3a3a42,#111);border-radius:0 0 5px 5px;z-index:2;border:1px solid #000}
  .key.white span{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:10px;color:#888;font-weight:700}
  .key.white.sel{background:linear-gradient(#ffe9b0,var(--acc))}
  .key.black.sel{background:linear-gradient(#c99a2e,var(--acc2))}
  .key.white.hint{background:linear-gradient(#cfe4ff,#8db8f5)}
  .key.black.hint{background:linear-gradient(#3b6db5,#2a4d80)}
  .key.flash{background:var(--ok)!important}

  /* ---------- exercise ---------- */
  .exhead{text-align:center;margin:8px 0 4px}
  .exhead .target{font-size:34px;font-weight:800;letter-spacing:1px}
  .exhead .sub{color:var(--dim);font-size:13px;margin-top:3px}
  .exprog{display:flex;gap:5px;justify-content:center;margin:10px 0}
  .exprog i{width:9px;height:9px;border-radius:50%;background:var(--bg3);border:1px solid var(--line)}
  .exprog i.on{background:var(--acc);border-color:var(--acc)}
  .exprog i.bad{background:var(--bad);border-color:var(--bad)}
  .exrow{display:flex;gap:10px;margin-top:10px}
  .exrow .btn{margin-top:0}
  .fb{text-align:center;min-height:22px;font-weight:700;font-size:14px;margin-top:10px}
  .fb.ok{color:var(--ok)} .fb.bad{color:var(--bad)}
  .chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0}
  .chip{padding:8px 14px;border-radius:10px;background:var(--bg3);border:1px solid var(--line);font-weight:700;font-size:15px}
  .chip.cur{background:var(--acc);color:#1a1200;border-color:var(--acc)}
  .chip.done{background:#153524;color:var(--ok);border-color:#1d4a31}
  .quizopt{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);
    color:var(--txt);border-radius:12px;padding:14px;font-size:15px;margin-bottom:8px;cursor:pointer;font-weight:600}
  .quizopt.right{background:#153524;border-color:var(--ok)}
  .quizopt.wrong{background:#3a1a20;border-color:var(--bad)}
  .quizwhy{background:var(--bg3);border-radius:10px;padding:12px;font-size:14px;color:#c9cde0;margin-top:4px;line-height:1.5}
  .earbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .earbtns .btn{margin-top:0}
  .checkstep{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border:1px solid var(--line);
    border-radius:12px;padding:12px;margin-bottom:8px;font-size:14px;line-height:1.45;color:#c9cde0}
  .checkstep b{color:var(--txt)}
  .checkstep .n{background:var(--acc);color:#1a1200;min-width:24px;height:24px;border-radius:8px;display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}

  /* ---------- metronome ---------- */
  .metro{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--line);
    border-radius:var(--r);padding:14px;margin:12px 0}
  .metro .bpm{font-size:26px;font-weight:800;min-width:78px;text-align:center}
  .metro .bpm small{display:block;font-size:11px;color:var(--dim);font-weight:600}
  .metro .adj{width:40px;height:40px;border-radius:11px;background:var(--bg3);border:1px solid var(--line);
    color:var(--txt);font-size:20px;font-weight:700;cursor:pointer}
  .metro .go{flex:1}
  .metro.beat{border-color:var(--acc)}

  /* ---------- tabs ---------- */
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,15,20,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);z-index:40}
  nav .in{max-width:520px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;border:none;color:var(--dim);padding:10px 0 max(10px,env(safe-area-inset-bottom));
    font-size:11px;font-weight:700;cursor:pointer}
  nav button .i{display:block;font-size:20px;margin-bottom:2px}
  nav button.on{color:var(--acc)}

  /* ---------- toast ---------- */
  #toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg3);
    border:1px solid var(--acc);color:var(--txt);padding:12px 22px;border-radius:14px;font-weight:700;
    z-index:100;transition:transform .35s;font-size:15px;white-space:nowrap}
  #toast.show{transform:translateX(-50%) translateY(0)}

  .shake{animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:14px;text-align:center}
  .stat b{display:block;font-size:24px;color:var(--acc)}
  .stat small{color:var(--dim);font-size:12px}
  h1.page{font-size:22px;font-weight:800;margin-bottom:14px}
  .cheat{font-size:14px;line-height:1.6;color:#c9cde0}
  .cheat b{color:var(--acc)}
  .cheat .row{padding:8px 0;border-bottom:1px solid var(--line)}
  .selrow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .selrow .tag{padding:8px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--line);
    font-size:13px;font-weight:700;cursor:pointer}
  .selrow .tag.on{background:var(--acc);color:#1a1200;border-color:var(--acc)}
  .key.black span{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:8px;color:#ccc;font-weight:700}
  .daily .row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .daily .row:last-of-type{border-bottom:none}
  .daily .st{width:26px;height:26px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;
    justify-content:center;font-size:14px;flex-shrink:0}
  .daily .row.ok .st{background:#153524;color:var(--ok)}
  .daily .row span{flex:1;font-size:14px;font-weight:600}
  .daily .row.ok span{color:var(--dim);text-decoration:line-through}
  .daily .bonus{font-size:12px;color:var(--dim);text-align:center;margin-top:8px}
  .week{display:flex;gap:6px;align-items:flex-end;height:78px;margin-top:14px}
  .week .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;gap:4px;text-align:center}
  .week .bar{background:linear-gradient(180deg,var(--acc),var(--acc2));border-radius:4px;min-height:2px}
  .week .col.z .bar{background:var(--bg3)}
  .week small{font-size:10px;color:var(--dim);font-weight:700}

  /* ---------- morceaux / play-along ---------- */
  .songitem{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);
    border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer}
  .songitem:active{background:var(--bg3)}
  .songitem .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:19px;background:var(--bg3);flex-shrink:0}
  .songitem .t{flex:1;min-width:0}
  .songitem .t b{display:block;font-size:15px}
  .songitem .t small{color:var(--dim);font-size:12px}
  .songitem .df{font-size:10px;font-weight:800;padding:4px 9px;border-radius:20px;background:var(--bg3);
    color:var(--dim);flex-shrink:0;text-transform:uppercase;letter-spacing:.4px}
  .songitem .df.f1{color:var(--ok)} .songitem .df.f2{color:var(--acc)}
  .songitem .df.f3{color:var(--purple)} .songitem .df.jam{color:var(--blue)}
  .songitem .played{color:var(--ok);font-size:12px;font-weight:700;flex-shrink:0}
  .strip{display:flex;gap:6px;overflow-x:auto;padding:6px 2px;margin:12px 0;scrollbar-width:none}
  .strip::-webkit-scrollbar{display:none}
  .strip .cc{flex-shrink:0;min-width:50px;text-align:center;padding:9px 8px;border-radius:10px;background:var(--bg2);
    border:1px solid var(--line);font-weight:800;font-size:15px;color:var(--dim);transition:transform .12s,background .12s}
  .strip .cc.cur{background:var(--acc);color:#1a1200;border-color:var(--acc);transform:scale(1.08)}
  .nowchord{text-align:center;margin:6px 0 2px}
  .nowchord .cn{font-size:32px;font-weight:800;letter-spacing:.5px;line-height:1.1}
  .nowchord .nn{color:var(--dim);font-size:13px;margin-top:2px}
  .tempo{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);
    border-radius:var(--r);padding:12px 14px;margin:10px 0}
  .tempo input[type=range]{flex:1;accent-color:var(--acc)}
  .tempo .tv{font-weight:800;min-width:54px;text-align:right;font-variant-numeric:tabular-nums}
  .tempo .tl{font-size:12px;color:var(--dim);font-weight:700;min-width:52px}
  .pbar{height:6px;background:#0009;border-radius:3px;overflow:hidden;margin:12px 0 4px}
  .pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc2),var(--acc));border-radius:3px}
  .key.target{animation:tgt .7s ease-in-out infinite}
  @keyframes tgt{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
  .key.white.wrong{background:linear-gradient(#ffb3bb,var(--bad))!important}
  .key.black.wrong{background:linear-gradient(#b53b47,#7a222c)!important}
  .modeseg{display:flex;gap:6px;background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:4px;margin:2px 0 10px}
  .modeseg button{flex:1;background:none;border:none;color:var(--dim);font-weight:700;font-size:13px;padding:9px 6px;border-radius:9px;cursor:pointer}
  .modeseg button.on{background:var(--acc);color:#1a1200}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">PIANO<span>DOJO</span></div>
    <div class="streak" id="streakBadge">🔥 0</div>
  </header>
  <main id="main"></main>
  <nav><div class="in">
    <button data-tab="parcours" class="on"><span class="i">🥋</span>Parcours</button>
    <button data-tab="dojo"><span class="i">⚔️</span>Dojo</button>
    <button data-tab="morceaux"><span class="i">🎶</span>Morceaux</button>
    <button data-tab="outils"><span class="i">🛠</span>Outils</button>
  </div></nav>
</div>
<div class="overlay" id="overlay"><div class="inner" id="overlayInner"></div></div>
<div id="toast"></div>

<script>
/* ================================================================
   PIANO DOJO — apprendre le piano par la théorie, sans solfège
   ================================================================ */

/* ---------------- données musicales ---------------- */
const NOTE = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const NOTE_FR = ['Do','Do#','Ré','Mib','Mi','Fa','Fa#','Sol','Lab','La','Sib','Si'];
const CHORD_TYPES = {
  maj:  {iv:[0,4,7],    suf:'',     nom:'majeur'},
  min:  {iv:[0,3,7],    suf:'m',    nom:'mineur'},
  dom7: {iv:[0,4,7,10], suf:'7',    nom:'7 (dominante)'},
  maj7: {iv:[0,4,7,11], suf:'maj7', nom:'majeur 7'},
  m7:   {iv:[0,3,7,10], suf:'m7',   nom:'mineur 7'},
};
const chordName = (root,t,bass=null) =>
  NOTE[root] + CHORD_TYPES[t].suf + (bass!=null ? '/'+NOTE[bass] : '');
const chordNotes = (root,t) => CHORD_TYPES[t].iv.map(i=>NOTE[(root+i)%12]).join(' – ');
/* voicing jouable : basse demandée en bas, les autres notes empilées juste au-dessus */
function voicingFor(root,t,bass=null){
  const need=CHORD_TYPES[t].iv.map(x=>(root+x)%12);
  const bassPc=(bass!=null?bass:root)%12;
  let cur=48+bassPc;
  const v=[cur], rest=need.filter(p=>p!==bassPc);
  let scan=cur+1;
  while(rest.length && scan<77){
    const i=rest.indexOf(scan%12);
    if(i>-1){ v.push(scan); rest.splice(i,1); }
    scan++;
  }
  return v;
}
const isBlack = m => [1,3,6,8,10].includes(m%12);

const LEVELS = [
  [0,'Touriste du clavier'],[120,'Ceinture blanche'],[300,'Ceinture jaune'],
  [550,'Ceinture orange'],[850,'Ceinture verte'],[1200,'Ceinture bleue'],
  [1700,'Ceinture marron'],[2300,'Ceinture noire'],[3200,'Sensei']
];

/* ---------------- état / sauvegarde ---------------- */
const DEFAULT_STATE = {xp:0, done:{}, prog:{}, streak:0, lastDay:null, earBest:0, daily:null, hist:{}, best:{}, labels:false, songs:{}, songsHand:{}, songsLH:{}};
/* restauration de progression via ?restore=<base64> (transfert d'appareil / d'origine) */
(function(){ try{
  const p=new URLSearchParams(location.search).get('restore'); if(!p) return;
  let s=p.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4) s+='=';
  const obj=JSON.parse(decodeURIComponent(escape(atob(s))));
  if(obj && typeof obj.xp==='number') localStorage.setItem('pianodojo',JSON.stringify(obj));
  history.replaceState(null,'',location.pathname);
}catch(e){} })();
let S = load();
function load(){
  try{ return Object.assign({},DEFAULT_STATE,JSON.parse(localStorage.getItem('pianodojo')||'{}')); }
  catch(e){ return {...DEFAULT_STATE}; }
}
function save(){ localStorage.setItem('pianodojo',JSON.stringify(S)); }
function levelOf(xp){
  let cur=LEVELS[0], next=null;
  for(let i=0;i<LEVELS.length;i++){ if(xp>=LEVELS[i][0]) cur=LEVELS[i]; else {next=LEVELS[i]; break;} }
  return {name:cur[1], base:cur[0], next};
}
function award(xp){
  const before=levelOf(S.xp).name;
  S.xp+=xp;
  const today=new Date().toISOString().slice(0,10);
  S.hist[today]=(S.hist[today]||0)+xp;
  Object.keys(S.hist).forEach(k=>{ if(Date.now()-new Date(k).getTime()>15*864e5) delete S.hist[k]; });
  if(S.lastDay!==today){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.streak = (S.lastDay===y) ? S.streak+1 : 1;
    S.lastDay=today;
  }
  save(); updateHeader();
  const after=levelOf(S.xp).name;
  if(after!==before) setTimeout(()=>toast('🥋 Nouveau grade : '+after),1400);
}
function updateHeader(){ document.getElementById('streakBadge').textContent='🔥 '+S.streak; }
const todayStr=()=>new Date().toISOString().slice(0,10);

/* ---------------- Maîtrise : paliers étalés dans le temps ----------------
   Une leçon ne se "valide" plus en une session. Il faut N paliers,
   et on ne peut prendre QU'UN palier PAR JOUR : le temps fait partie du travail.
   Les leçons dures (7e, voice leading, shell voicings) en demandent plus. */
const REPS={
  m0l1:2, m0l2:3, m0l3:3,
  m1l1:3, m1l2:4,
  m2l1:2, m2l2:3, m2l3:3,
  m3l1:3, m3l2:4, m3l3:3, m3l4:3, m3l5:4,
  m4l1:3, m4l2:3,
  m5l1:5, m5l2:5, m5l3:5, m5l4:4,
  m6l1:3, m6l2:4, m6l3:4, m6l4:4,
  m7l1:3, m7l2:3
};
function lessonReps(l){ return REPS[l.id]||3; }
function progOf(id){ if(!S.prog) S.prog={}; return S.prog[id]||{n:0,last:null}; }
function palierTakenToday(id){ return progOf(id).last===todayStr(); }

function ensureDaily(){
  const t=todayStr();
  if(!S.daily || S.daily.date!==t){ S.daily={date:t, done:[false,false,false], bonus:false}; save(); }
  return S.daily;
}
function dailyMark(i){
  const d=ensureDaily();
  if(d.done[i]) return;
  d.done[i]=true; save();
  if(d.done.every(Boolean) && !d.bonus){
    d.bonus=true; save(); award(30);
    setTimeout(()=>toast('📅 Séance du jour complète · +30 XP'),900);
  }
}

/* ---------------- audio ---------------- */
let AC=null;
function ac(){
  if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function playNote(midi, dur=1.4, vel=.4, when=0){
  const ctx=ac(), t=ctx.currentTime+when;
  const f=440*Math.pow(2,(midi-69)/12);
  const g=ctx.createGain(), lp=ctx.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=Math.min(f*7,9500); lp.Q.value=.5;
  g.connect(lp); lp.connect(ctx.destination);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vel,t+.006);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  [[1,1,0],[2,.32,5],[2.997,.1,-5],[4.003,.05,0],[5.01,.02,3]].forEach(([m,a,d])=>{
    const o=ctx.createOscillator(), og=ctx.createGain();
    o.type='sine'; o.frequency.value=f*m; o.detune.value=d; og.gain.value=a;
    o.connect(og); og.connect(g); o.start(t); o.stop(t+dur+.1);
  });
}
function chime(){ [72,76,79,84].forEach((m,i)=>playNote(m,.7,.22,i*.07)); }
function playChord(midis, dur=1.6, strum=.028){
  midis.slice().sort((a,b)=>a-b).forEach((m,i)=>playNote(m,dur,.35,i*strum));
}
/* démonstration deux mains d'un exercice de pratique (main gauche grave, droite aiguë) */
function playDemo(spec, bpm, rate){
  ac(); rate=rate||1;
  const beat=60/bpm/rate; let t=.1;
  spec.prog.forEach(ch=>{
    const type=ch.type||'maj';
    const rh=voicingFor(ch.root,type, ch.bass!=null?ch.bass:null).map(m=>m+12);
    const bass=36+(ch.root%12);
    if(spec.rh==='none'){ /* main gauche seule */ }
    else if(spec.rh==='arp8'){
      const seq=[rh[0], rh[1]||rh[0]+4, rh[2]||rh[0]+7, rh[1]||rh[0]+4];
      for(let e=0;e<8;e++) playNote(seq[e%4], beat*.9, .3, t+e*beat/2);
    } else {
      const hits = spec.rh==='half'?[0,2] : spec.rh==='quarter'?[0,1,2,3] : [0];
      const dur = spec.rh==='quarter'?beat*.85 : spec.rh==='half'?beat*1.85 : beat*3.8;
      hits.forEach(h=> rh.forEach((m,idx)=> playNote(m, dur, .3, t+h*beat+idx*.012)) );
    }
    if(spec.lh==='158'){ const p=[0,7,12,7]; for(let b=0;b<4;b++) playNote(bass+p[b], beat*.9, .46, t+b*beat); }
    else if(spec.lh==='octave'){ playNote(bass,beat*3.9,.42,t); playNote(bass+12,beat*3.9,.42,t); }
    else if(spec.lh==='fifth'){ // basse qui marche : fondamentale ↔ quinte (1-5-1-5)
      const p=[0,7,0,7]; for(let b=0;b<4;b++) playNote(bass+p[b], beat*.9, .46, t+b*beat);
    }
    else if(spec.lh==='shell'){ // shell voicing : fondamentale grave + 3e/7e au-dessus
      const iv = (type==='m7'||type==='min')?3 : 4;              // tierce
      const sv = (type==='maj7')?11 : (type==='dom7'||type==='m7')?10 : null; // septième
      playNote(bass, beat*3.9, .46, t);
      playNote(bass+12+iv, beat*3.8, .30, t+.012);
      if(sv!=null) playNote(bass+12+sv, beat*3.8, .30, t+.024);
    }
    else if(spec.lh==='pulse'){ // pouls hypnotique : octaves de fondamentale en noires
      for(let b=0;b<4;b++){ playNote(bass, beat*.85, .44, t+b*beat); playNote(bass+12, beat*.85, .3, t+b*beat+.012); }
    }
    else playNote(bass, beat*3.9, .46, t);
    t+=beat*4;
  });
  // mélodie écrite par-dessus toute la grille : [{n:midi, b:temps, d:durée en temps}]
  if(spec.melody){
    const t0=.1;
    spec.melody.forEach(x=> playNote(x.n, beat*(x.d||0.5)*.95, .34, t0+x.b*beat));
  }
}

/* ---------------- métronome ---------------- */
const Metro = {
  bpm:70, on:false, timer:null, nextT:0, beat:0, el:null,
  click(t,accent){
    const ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=accent?1500:900; g.gain.setValueAtTime(accent?.5:.3,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.05);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+.06);
  },
  start(){
    this.stop(); this.on=true; const ctx=ac();
    this.nextT=ctx.currentTime+.05; this.beat=0;
    this.timer=setInterval(()=>{
      while(this.nextT<ctx.currentTime+.12){
        this.click(this.nextT,this.beat%4===0);
        if(this.el){ this.el.classList.add('beat'); setTimeout(()=>this.el&&this.el.classList.remove('beat'),100); }
        this.beat++; this.nextT+=60/this.bpm;
      }
    },25);
  },
  stop(){ this.on=false; if(this.timer){clearInterval(this.timer); this.timer=null;} }
};
function metroWidget(bpm){
  Metro.bpm=bpm||Metro.bpm;
  const d=document.createElement('div'); d.className='metro';
  d.innerHTML=`<button class="adj" data-d="-5">−</button>
    <div class="bpm"><span>${Metro.bpm}</span><small>BPM</small></div>
    <button class="adj" data-d="5">+</button>
    <button class="btn small go">▶ Lancer</button>`;
  Metro.el=d;
  const span=d.querySelector('.bpm span'), go=d.querySelector('.go');
  d.querySelectorAll('.adj').forEach(b=>b.onclick=()=>{
    Metro.bpm=Math.max(40,Math.min(200,Metro.bpm+ +b.dataset.d)); span.textContent=Metro.bpm;
  });
  go.onclick=()=>{
    if(Metro.on){ Metro.stop(); go.textContent='▶ Lancer'; }
    else { Metro.start(); go.textContent='◼ Stop'; }
  };
  return d;
}

/* ---------------- clavier ---------------- */
function buildKeyboard(lo, hi, onTap){
  const wrap=document.createElement('div'); wrap.className='kbdwrap';
  const kbd=document.createElement('div'); kbd.className='kbd'; wrap.appendChild(kbd);
  const whites=[]; for(let m=lo;m<=hi;m++) if(!isBlack(m)) whites.push(m);
  const wW=100/whites.length;
  whites.forEach((m,i)=>{
    const k=document.createElement('div'); k.className='key white'; k.dataset.midi=m;
    k.style.left=(i*wW)+'%'; k.style.width=wW+'%';
    if(S.labels) k.innerHTML=`<span>${NOTE[m%12]}</span>`;
    else if(m%12===0) k.innerHTML=`<span>C${Math.floor(m/12)-1}</span>`;
    kbd.appendChild(k);
  });
  for(let m=lo;m<=hi;m++){
    if(!isBlack(m)) continue;
    const wIdx=whites.filter(w=>w<m).length, bw=wW*.62;
    const k=document.createElement('div'); k.className='key black'; k.dataset.midi=m;
    k.style.left=(wIdx*wW-bw/2)+'%'; k.style.width=bw+'%';
    if(S.labels) k.innerHTML=`<span>${NOTE[m%12]}</span>`;
    kbd.appendChild(k);
  }
  kbd.addEventListener('pointerdown',e=>{
    const k=e.target.closest('.key'); if(!k) return;
    e.preventDefault(); onTap(+k.dataset.midi,k);
  });
  wrap.kbd=kbd;
  wrap.keyEl=m=>kbd.querySelector(`[data-midi="${m}"]`);
  wrap.clearSel=()=>kbd.querySelectorAll('.sel,.hint').forEach(k=>k.classList.remove('sel','hint'));
  return wrap;
}

      {root:5,t:'maj'},{root:0,t:'maj'},{root:2,t:'min'},{root:10,t:'maj'}
    ], sub:'4 accords en Sol, puis 4 en Fa. Renversements libres.'}},

{ id:'m3', title:'Module 3 · La main gauche', lessons:[
  { id:'m3l1', icon:'🐘', title:'La basse, c\'est la fondamentale', sub:'Deux mains, premier vrai son de piano', xp:50,
    theory:`
<p>Jusqu'ici tu joues d'une main. Un piano, ça se joue à deux. La bonne nouvelle : la main gauche du débutant intelligent est <b>très simple</b>.</p>
<h3>La règle n°1</h3>
<div class="formula">Main gauche = LA FONDAMENTALE de l'accord, une octave plus bas</div>
<p>Accord de C à droite → un C grave à gauche. Accord de F/A à droite → un <b>F</b> à gauche (la fondamentale, pas la basse du renversement !). C'est la main gauche qui dit le nom de l'accord ; du coup la main droite est libre de renverser comme elle veut.</p>
<h3>Montée en puissance</h3>
<ul>
<li>Niveau 1 : une note (la fondamentale)</li>
<li>Niveau 2 : l'octave (C grave + C au-dessus, pouce-auriculaire)</li>
<li>Niveau 3 : la quinte (C + G) — stable, sonne bien partout</li>
</ul>
<div class="tip">Ce module se joue sur ton VRAI piano. L'app te donne le programme et le métronome ; tes doigts font le travail. La validation est sur l'honneur — te mentir à toi-même ne fera progresser personne.</div>`,
    ex:{type:'practice', bpm:60, video:'piano accompagnement main gauche fondamentale débutant',
      demos:[{label:'Le cycle, deux mains', rh:'hold', lh:'root', prog:[{root:0},{root:5,bass:0},{root:7,bass:11},{root:0}]}],
      steps:[
      ['Pose le cycle','Main droite : C → F/C → G/B → C (le cycle du module 1). Main gauche : la fondamentale correspondante (C, F, G, C) une octave plus bas.'],
      ['Métronome à 60','Un accord par clic accentué (donc tenu 4 temps). Change PENDANT le dernier temps, pas après.'],
      ['4 tours propres d\'affilée','Sans hésitation entre les accords. Si tu hésites, le compteur repart à zéro. Sérieusement.'],
      ['Niveau 2','Refais pareil avec l\'octave à la main gauche (C+C, F+F, G+G).']
    ]}},
  { id:'m3l2', icon:'🌀', title:'Le pattern 1-5-8', sub:'La main gauche qui sonne pro', xp:60,
    theory:`
<p>Le pattern <b>1-5-8</b> : fondamentale, quinte, octave, joués <b>en arpège</b> (l'une après l'autre). C'est LA main gauche des ballades — des berceuses aux génériques de films.</p>
<h3>Sur C</h3>
<p>1 = C (auriculaire) · 5 = G (index) · 8 = C au-dessus (pouce). Tu joues 1–5–8–5, en boucle, une note par temps.</p>
<h3>La magie</h3>
<p>Ce pattern ne contient <b>ni tierce ni couleur</b> : il fonctionne tel quel sur les accords majeurs ET mineurs. Sur Am : A–E–A. Sur F : F–C–F. Tu déplaces la main, le motif ne change jamais.</p>
<div class="tip">Difficulté réelle : jouer la main gauche en arpège PENDANT que la droite tient l'accord. C'est le premier vrai exercice d'indépendance des mains. Lent d'abord. Le métronome n'est pas décoratif.</div>`,
    ex:{type:'practice', bpm:60, video:'piano main gauche arpège 1 5 8 accompagnement débutant',
      demos:[
        {label:'1-5-8 sur Do (main gauche seule)', rh:'none', lh:'158', prog:[{root:0}]},
        {label:'Le cycle complet, deux mains', rh:'hold', lh:'158', prog:[{root:0},{root:7},{root:9,type:'min'},{root:5}]}
      ],
      steps:[
      ['Main gauche seule','1-5-8-5 sur C, une note par clic, à 60 BPM. Puis sur Am, F, G. Une minute par accord.'],
      ['Les deux mains','Main droite plaque l\'accord sur le 1er temps et le tient. Main gauche joue 1-5-8-5. Sur C uniquement, jusqu\'à ce que ce soit stable.'],
      ['Le cycle complet','C → G → Am → F avec ce pattern, 4 temps par accord, 4 tours sans arrêt.'],
      ['Monte à 70-75 BPM','Seulement si les 4 tours à 60 sont vraiment propres.']
    ]}},
  { id:'m3l3', icon:'🤝', title:'Qui joue quoi', sub:'Comprendre ce que tes deux mains font vraiment', xp:70,
    theory:`
<p>Si tu as l'impression de poser des formes sans savoir ce que tu joues, c'est normal : personne ne te l'a dit. Voilà la clé.</p>
<h3>Un accord n'est pas une forme</h3>
<p>Un accord, c'est un <b>ensemble de notes</b>. « C majeur = C, E, G ». Point. Ça ne dit <b>pas</b> où tu les mets, ni dans quelle main. La forme que tu poses s'appelle un <b>voicing</b> : c'est une <i>décision</i>, pas l'accord lui-même.</p>
<h3>Le partage du travail</h3>
<div class="formula">Main gauche = QUI (la fondamentale) · Main droite = QUOI (la couleur)</div>
<p>La gauche annonce l'identité de l'accord. Du coup la droite <b>n'a pas besoin de rejouer la fondamentale</b> : elle est déjà dite. C'est LA raison pour laquelle tes formes main droite te paraissent bizarres — elles ne contiennent souvent pas la note qui donne son nom à l'accord.</p>
<h3>La démonstration qui change tout</h3>
<p>Garde la même main droite : <b>C–E</b>. Deux notes, rien d'autre. Maintenant change juste la main gauche :</p>
<ul>
<li>Un <b>C</b> grave à gauche → C–E–G ? Non : C–C–E → tu entends <b>C majeur</b> (la quinte n'est même pas nécessaire).</li>
<li>Un <b>A</b> grave à gauche → A–C–E = <b>La mineur</b>.</li>
<li>Un <b>F</b> grave à gauche → F–C–E ≈ <b>Fmaj7</b> (fondamentale, quinte, septième majeure).</li>
</ul>
<p><b>Même main droite. Trois accords différents.</b> C'est la basse qui décide. Ta main gauche n'est pas un accompagnement décoratif : c'est elle qui nomme l'harmonie.</p>
<h3>La règle du grave (pourquoi ça sonne boueux)</h3>
<p>En dessous de <b>Do2</b>, les notes serrées se brouillent — l'oreille ne sépare plus. Règle : <b>grave = espacé</b> (fondamentale seule, ou octave, ou quinte). <b>Serré = au milieu</b> du clavier. Si ton accord sonne « sale », il est presque toujours trop bas et trop serré.</p>
<div class="tip">À partir de maintenant, quand tu joues, pose-toi la question : « ma gauche dit quoi ? ma droite dit quoi ? ». Si tu peux répondre, tu ne joues plus des formes : tu fais de la musique.</div>`,
    ex:{type:'quiz', qs:[
      {q:'Main gauche : un C grave. Main droite : E–G. Quel accord joues-tu ?', opts:['C majeur','Em','G majeur'], a:0,
       why:'Additionne tout : C + E + G = C majeur. La main droite n\'a pas besoin du C — la gauche le dit déjà.'},
      {q:'Main gauche : un A grave. Main droite : C–E. Quel accord joues-tu ?', opts:['C majeur','Am','F majeur'], a:1,
       why:'A + C + E = La mineur. Note bien : ta main droite (C–E) est presque la même que dans l\'exemple précédent. C\'est la BASSE qui décide de l\'accord.'},
      {q:'Main gauche : C. Main droite : E–G–B. Quel accord ?', opts:['C majeur','Cmaj7','C7'], a:1,
       why:'C–E–G–B = fondamentale, tierce, quinte, septième MAJEURE = Cmaj7. Le B est la 7e majeure : le son doux, jazzy.'},
      {q:'Pourquoi la main droite peut-elle omettre la fondamentale ?', opts:['Pour jouer moins de notes','Parce que la main gauche la joue déjà','C\'est une faute'], a:1,
       why:'L\'accord existe dès que les notes sont là, peu importe la main. La gauche dit la fondamentale → la droite est libre pour la couleur.'},
      {q:'Tu plaques C–E–G serré tout en bas du clavier. Ça sonne…', opts:['Riche et grave','Boueux','Trop aigu'], a:1,
       why:'Sous Do2, les intervalles serrés se brouillent. Dans le grave : espace (fondamentale seule, octave, ou quinte). Le serré, c\'est pour le milieu du clavier.'},
      {q:'« Voicing » veut dire…', opts:['Un accord','La façon dont tu répartis les notes de l\'accord','Le nom d\'une gamme'], a:1,
       why:'L\'accord est la liste des notes. Le voicing est TA décision : lesquelles, où, dans quelle main. Un accord = une infinité de voicings.'}
    ]}},
  { id:'m3l4', icon:'🧩', title:'Le rôle de chaque note', sub:'Fondamentale, tierce, quinte, septième', xp:70,
    theory:`
<p>Quatre notes, quatre métiers. Une fois que tu sais qui fait quoi, tu peux <b>choisir</b> au lieu de subir.</p>
<h3>Le casting</h3>
<ul>
<li><b>La fondamentale</b> — l'identité. Elle dit le NOM de l'accord. C'est le travail de ta main gauche.</li>
<li><b>La tierce</b> — le genre. Majeur ou mineur, c'est <b>elle seule</b> qui décide. E dans C = majeur ; Eb = mineur. Indispensable.</li>
<li><b>La quinte</b> — le remplissage. Elle ne porte ni l'identité ni le genre. Elle stabilise, c'est tout. <b>C'est la première qu'on jette.</b></li>
<li><b>La septième</b> — la couleur. Elle transforme un accord scolaire en son adulte, et crée la tension qui donne envie d'aller ailleurs.</li>
</ul>
<h3>La conséquence pratique</h3>
<div class="formula">Fondamentale + tierce + septième = l'essence de l'accord</div>
<p>Ces trois notes suffisent à dire « Cmaj7 » sans ambiguïté. Les pianistes de jazz jouent ça toute la journée et laissent tomber la quinte. Si tu manques de doigts ou que ça sonne encombré : <b>enlève la quinte</b>, jamais la tierce.</p>
<div class="tip">Test à faire au piano : joue C–E–G–B, puis C–E–B (sans quinte). Écoute. C'est le même accord — en plus clair. Voilà pourquoi certaines de tes formes n'ont « que » trois notes.</div>`,
    ex:{type:'quiz', qs:[
      {q:'Dans C–E–G, quelle note dit que l\'accord est MAJEUR ?', opts:['C','E','G'], a:1,
       why:'La tierce (E). Baisse-la d\'un demi-ton (Eb) → Cm. La tierce décide du genre, à elle seule.'},
      {q:'Quelle note peux-tu retirer sans changer la nature de l\'accord ?', opts:['La fondamentale','La tierce','La quinte'], a:2,
       why:'La quinte. Elle ne porte ni l\'identité (fondamentale) ni le genre (tierce). C\'est la première qu\'on sacrifie.'},
      {q:'Dans Cmaj7 (C–E–G–B), le B est…', opts:['La quinte','La septième','La neuvième'], a:1,
       why:'C(1) D(2) E(3) F(4) G(5) A(6) B(7). Le B est la septième — ici majeure, d\'où « maj7 ».'},
      {q:'Tu joues C–E–B, sans quinte. C\'est…', opts:['Une faute','Cmaj7, parfaitement valable','C7'], a:1,
       why:'Fondamentale + tierce + septième = l\'essence de Cmaj7. C\'est même le voicing préféré des pianistes.'},
      {q:'Qu\'est-ce qui différencie C7 de Cmaj7 ?', opts:['La tierce','La septième (Bb au lieu de B)','La quinte'], a:1,
       why:'C7 a un Bb (7e mineure) → tendu, bluesy, ça « appelle » la suite. Cmaj7 a un B (7e majeure) → doux, posé.'},
      {q:'Ton accord sonne encombré et tu manques de doigts. Tu enlèves…', opts:['La quinte','La tierce','La fondamentale de la main gauche'], a:0,
       why:'Toujours la quinte en premier. Enlever la tierce rendrait l\'accord sans genre ; enlever la basse lui ferait perdre son nom.'}
    ]}},
  { id:'m3l5', icon:'🚶', title:'La main gauche qui bouge', sub:'De la basse plantée à la basse qui marche', xp:80,
    theory:`
<p>Jusqu'ici ta main gauche <b>plante</b> une note et attend. C'est bien pour commencer, et c'est vite ennuyeux. On va la faire marcher — sans changer l'harmonie.</p>
<h3>Étape 1 — l'aller-retour 1–5</h3>
<div class="formula">Fondamentale → Quinte → Fondamentale → Quinte</div>
<p>Sur C : <b>C – G – C – G</b>, une note par temps, pendant que la droite tient l'accord. L'harmonie ne change pas (la quinte fait déjà partie de l'accord) mais ça respire. C'est la main gauche de la moitié de la variété et de la country.</p>
<h3>Étape 2 — pourquoi ça marche</h3>
<p>Souviens-toi de la leçon précédente : la quinte est la note la plus <b>neutre</b> de l'accord. Elle ne change ni l'identité ni le genre. Donc tu peux alterner fondamentale/quinte à volonté : l'oreille entend toujours le même accord, avec du mouvement en plus.</p>
<h3>Étape 3 — relier les accords</h3>
<p>Quand tu changes d'accord, ta basse peut <b>viser la note suivante</b> au lieu de sauter. De C vers F : joue <b>C – G – A – Bb</b> → tu arrives sur F par en dessous. Cette note qui n'appartient pas à l'accord s'appelle une <b>note de passage</b> : elle dure un instant et résout. C'est le début de la <i>walking bass</i>.</p>
<div class="tip">Règle d'or : la main gauche bouge sur les temps, jamais au hasard. Si tu ne sais pas quoi jouer, rejoue la fondamentale. Une basse simple et juste vaut mille fois une basse bavarde et fausse.</div>`,
    ex:{type:'practice', bpm:60, video:'piano main gauche basse alternée fondamentale quinte débutant',
      demos:[
        {label:'Étape 1 — l\'aller-retour 1–5 sur Do', rh:'none', lh:'fifth', prog:[{root:0}]},
        {label:'Étape 1 — les deux mains', rh:'hold', lh:'fifth', prog:[{root:0},{root:7},{root:9,type:'min'},{root:5}]},
        {label:'Comparaison — basse plantée', rh:'hold', lh:'root', prog:[{root:0},{root:7},{root:9,type:'min'},{root:5}]}
      ],
      steps:[
      ['Main gauche seule, 1–5','C–G–C–G à 60 BPM, une note par clic. Puis Am (A–E), F (F–C), G (G–D). Une minute chacun.'],
      ['Les deux mains','Droite : plaque l\'accord et tiens-le. Gauche : C–G–C–G. Sur C seulement, jusqu\'à ce que ta droite ne bronche plus quand ta gauche bouge.'],
      ['Le cycle','C → G → Am → F, basse alternée 1–5 sur chaque accord, 4 temps par accord. 4 tours sans faute.'],
      ['La note de passage','De C vers F : joue C–G–A–Bb, puis atterris sur F. Écoute comme l\'arrivée est inévitable. Refais-le de F vers C (F–C–D–E → C).'],
      ['Vérifie que tu comprends','Dis à voix haute, en jouant : « je joue la fondamentale, puis la quinte ». Si tu ne peux pas nommer la note que tu joues, ralentis.']
    ]}},
]},
{ id:'m4', title:'Module 4 · Le rythme', lessons:[
  { id:'m4l1', icon:'🥁', title:'La pulsation avant tout', sub:'Noires, blanches, la pompe', xp:50,
    theory:`
<p>Vérité dure : un accord faux dans le rythme passe inaperçu ; un accord juste hors rythme ruine tout. Le rythme n'est pas un chapitre, c'est <b>le</b> chapitre.</p>
<h3>Le vocabulaire minimal (sans partition)</h3>
<ul>
<li><b>Pulsation</b> : le battement régulier — ce que ton pied tape. Le métronome le matérialise.</li>
<li><b>Mesure</b> : les pulsations se groupent par 4 (le "4/4", ultra-majoritaire). Le clic aigu du métronome = temps 1.</li>
<li><b>Ronde</b> = tenir 4 temps. <b>Blanche</b> = 2 temps. <b>Noire</b> = 1 temps.</li>
</ul>
<h3>Trois patterns d'accompagnement</h3>
<ul>
<li><b>Pattern A (ronde)</b> : plaque l'accord sur le temps 1, tiens 4 temps. Ce que tu fais déjà.</li>
<li><b>Pattern B (blanches)</b> : plaque sur 1 et sur 3.</li>
<li><b>Pattern C (la pompe)</b> : plaque sur chaque temps — 1, 2, 3, 4. Le son pop/rock de base.</li>
</ul>
<div class="tip">Le test du vrai rythme : tu dois pouvoir <b>chanter ou parler</b> par-dessus. Si jouer t'empêche de compter à voix haute ("1, 2, 3, 4"), c'est que ce n'est pas encore acquis.</div>`,
    ex:{type:'practice', bpm:65, video:'piano rythme main gauche pompe accords débutant',
      demos:[
        {label:'Pattern A — tenu', rh:'hold', lh:'root', prog:[{root:0},{root:7},{root:9,type:'min'},{root:5}]},
        {label:'Pattern B — sur 1 et 3', rh:'half', lh:'root', prog:[{root:0},{root:7},{root:9,type:'min'},{root:5}]},
        {label:'Pattern C — la pompe', rh:'quarter', lh:'root', prog:[{root:0},{root:7},{root:9,type:'min'},{root:5}]}
      ],
      steps:[
      ['Pattern A','I–V–vi–IV en Do (C–G–Am–F), un accord par mesure, plaqué sur le temps 1. 4 tours en comptant À VOIX HAUTE.'],
      ['Pattern B','Même progression, accord plaqué sur les temps 1 et 3. 4 tours.'],
      ['Pattern C — la pompe','Accord plaqué sur chaque temps. 4 tours. Garde le poignet souple, frappe depuis le poignet, pas depuis l\'épaule.'],
      ['Mélange','Un tour en A, un tour en B, un tour en C, sans t\'arrêter entre les tours.']
    ]}},
  { id:'m4l2', icon:'💫', title:'Croches et arpèges', sub:'Diviser le temps en deux', xp:60,
    theory:`
<p>Dernière brique rythmique de base : la <b>croche</b> = un demi-temps. Entre deux clics du métronome, tu joues DEUX notes régulières. On compte : « 1-et-2-et-3-et-4-et ».</p>
<h3>L'arpège main droite</h3>
<p>Au lieu de plaquer C–E–G, égrène les notes : C (1) E (et) G (2) E (et)… Le motif <b>bas-milieu-haut-milieu</b> en croches, c'est l'accompagnement de ballade par excellence.</p>
<h3>Combiné main gauche</h3>
<p>Main gauche : fondamentale tenue (ou octave) sur le temps 1. Main droite : arpège en croches. Ce combo = 80 % des ballades piano que tu entends.</p>
<div class="warn">Régularité &gt; vitesse. Des croches inégales à 60 BPM sonnent amateur ; des croches parfaites à 60 BPM sonnent pro. Le métronome tranche, pas ton impression.</div>`,
    ex:{type:'practice', bpm:60, video:'piano arpège croches ballade main gauche débutant',
      demos:[{label:'Arpège en croches, deux mains', rh:'arp8', lh:'root', prog:[{root:0},{root:7},{root:9,type:'min'},{root:5}]}],
      steps:[
      ['Croches sur une note','Main droite, un seul C : deux frappes régulières par clic, en comptant "1-et-2-et…". 8 mesures parfaitement égales.'],
      ['Arpège bas-milieu-haut-milieu','Sur C : C-E-G-E en croches (2 temps le motif, donc 2 motifs par mesure). Puis sur Am, F, G.'],
      ['Deux mains','Gauche : fondamentale sur le temps 1, tenue. Droite : arpège en croches. Cycle C–G–Am–F, 4 tours.'],
      ['Test final','Le même cycle en chantonnant n\'importe quoi par-dessus. Si tu peux, c\'est acquis.']
    ]}},
]},
{ id:'m5', title:'Module 5 · Les accords de 7e', lessons:[
  { id:'m5l1', icon:'🎨', title:'La 7e : trois couleurs', sub:'maj7, m7, 7 — le son adulte', xp:70,
    theory:`
<p>Tes accords de 3 notes sont corrects mais un peu… scolaires. On ajoute une 4e note : la <b>septième</b>. C'est le moment où ton piano commence à sonner comme un disque.</p>
<h3>Les trois formules (à partir de l'accord de base)</h3>
<div class="formula">Xmaj7 = majeur + 11 demi-tons &nbsp;·&nbsp; X7 = majeur + 10 &nbsp;·&nbsp; Xm7 = mineur + 10</div>
<p>Plus simple à retenir en partant de l'octave :</p>
<ul>
<li><b>Cmaj7</b> (C–E–G–B) : la 7e est <b>1 demi-ton sous l'octave</b>. Couleur : rêveuse, élégante, jazz doux.</li>
<li><b>C7</b> (C–E–G–Bb) : <b>2 demi-tons sous l'octave</b>. Couleur : blues, tension qui veut se résoudre.</li>
<li><b>Cm7</b> (C–Eb–G–Bb) : mineur + 7e à 2 demi-tons sous l'octave. Couleur : soul, feutré, néo-soul.</li>
</ul>
<div class="tip">Joue C, puis Cmaj7, puis C7, puis Cm7 à la suite et ÉCOUTE la couleur changer. La théorie te dit où poser les doigts ; tes oreilles te disent pourquoi.</div>`,
    ex:{type:'chord', items:[
      {root:0,t:'maj7'},{root:9,t:'m7'},{root:2,t:'m7'},{root:7,t:'dom7'},
      {root:5,t:'maj7'},{root:4,t:'m7'},{root:0,t:'dom7'},{root:10,t:'maj7'}
    ], sub:'4 notes. Construis depuis la formule, pas au hasard.'}},
  { id:'m5l2', icon:'🕴', title:'ii–V–I : la cadence reine', sub:'Dm7 → G7 → Cmaj7', xp:80,
    theory:`
<p>Le <b>ii–V–I</b> : la progression la plus jouée de l'histoire du jazz, et l'ADN de la moitié de la soul et de la bossa. En Do : <b>Dm7 → G7 → Cmaj7</b>.</p>
<h3>Pourquoi elle fonctionne</h3>
<p>C'est une histoire en trois actes : le ii prépare (tension douce), le V crée l'urgence (le 7 de dominante veut <i>vraiment</i> se résoudre), le Imaj7 apaise. Départ → tension → maison.</p>
<h3>Le geste malin</h3>
<p>Encore le voice leading : de Dm7 (D–F–A–C) à G7, ne saute pas : joue <b>G7/B</b> (B–D–F–G, ou simplement B–F au minimum). Puis Cmaj7 (C–E–G–B). Les notes glissent, elles ne sautent pas.</p>
<div class="tip">Ce ii–V–I, transpose-le plus tard dans d'autres tonalités (Em7–A7–Dmaj7…). C'est un investissement à vie : il est PARTOUT.</div>`,
    ex:{type:'prog', rounds:2, free:true, chords:[
      {root:2,t:'m7'},{root:7,t:'dom7'},{root:0,t:'maj7'}
    ], sub:'Renversements libres. Écoute la tension se résoudre.'}},
  { id:'m5l3', icon:'🐚', title:'Shell voicings : 1–3–7', sub:'LE son adulte — et enfin l\'explication', xp:90,
    theory:`
<p>Voici la leçon qui explique la <b>forme bizarre</b> que les pianistes posent à gauche pendant que la droite joue. Ça s'appelle un <b>shell voicing</b> — un « accord coquille ».</p>
<h3>Le principe</h3>
<div class="formula">Main gauche = fondamentale + la 3e (et/ou la 7e) &nbsp;·&nbsp; Main droite = le reste</div>
<p>Rappelle-toi la leçon « le rôle de chaque note » : <b>fondamentale + tierce + septième = l'essence de l'accord</b>. La quinte ne sert à rien ici. Un shell voicing, c'est exactement ça : le squelette, rien de plus.</p>
<h3>Sur Cmaj7</h3>
<ul>
<li>Main gauche : <b>C</b> (grave) + <b>E</b> et <b>B</b> au-dessus → fondamentale, tierce, septième</li>
<li>Main droite : libre. La couleur, la mélodie, ou rien du tout.</li>
</ul>
<p>Écoute la démo : c'est un accord à trois notes et pourtant il sonne <b>plus riche</b> que ton C–E–G–B plaqué. Parce qu'il est <b>espacé</b> (souviens-toi de la règle du grave) et qu'il ne dit que l'essentiel.</p>
<h3>Les deux formes à connaître</h3>
<ul>
<li><b>1–3–7</b> : fondamentale, tierce, septième (la plus courante)</li>
<li><b>1–7–3</b> : fondamentale, septième, tierce (la tierce au-dessus — plus doux)</li>
</ul>
<h3>Pourquoi ça change tout sur un ii–V–I</h3>
<p>Dm7 (D–F–C) → G7 (G–F–B) → Cmaj7 (C–E–B). Regarde : entre Dm7 et G7, le <b>F ne bouge pas</b> et le C descend d'un demi-ton vers le B. Tes doigts bougent à peine, et pourtant l'harmonie avance. <b>C'est ça, jouer intelligemment.</b></p>
<div class="tip">Si tu ne retiens qu'une chose de toute l'app : la tierce et la septième sont les deux notes qui font l'harmonie. Fondamentale à gauche, tierce + septième au-dessus, et tu sonnes comme quelqu'un qui sait ce qu'il fait — parce que ce sera vrai.</div>`,

<p>Tu as entendu ce truc quelque part : main gauche qui martèle <b>La – Sol – Fa</b> en rythme régulier, main droite qui joue « n'importe quoi » avec La, Do, Ré, Ré#, Mi, Sol… et ça sonne comme un disque. Décodons — parce que ce n'est pas de la magie, c'est <b>deux ingrédients précis</b>.</p>
<h3>Ingrédient 1 : le vamp</h3>
<p>La main gauche ne fait pas « un rythme » : elle fait un <b>vamp</b> — une boucle courte, hypnotique, PRÉVISIBLE. <b>Am → G → F → G</b>, une mesure chacun, en octaves pulsées. Sa régularité est le socle : c'est parce qu'elle ne surprend jamais que la droite peut tout se permettre. Un vamp qui hésite = une impro qui s'écroule. La gauche est le métronome ET l'harmonie.</p>

  { id:'m6l4', icon:'🖐️', title:'Les mains séparées : le mensonge de l\'indépendance', sub:'Le Découpleur — jugé par l\'app', xp:110,
    theory:`
<p>Tu bloques sur « séparer les mains » ? Première vérité libératrice : <b>l'indépendance des mains n'existe pas</b>. Aucun pianiste n'a deux cerveaux. Ce qu'ils ont, c'est autre chose : une main gauche <b>automatisée</b> (elle tourne toute seule, comme marcher) et une main droite qui joue <b>contre</b> cette pulsation — sur une seule et même grille rythmique.</p>
<h3>Le test de la distraction</h3>
<p>Comment savoir si ta gauche est automatisée ? Joue le vamp et <b>parle en même temps</b> — récite ta liste de courses, compte à rebours depuis 50. Si le vamp s'écroule dès que tu parles, il n'est pas automatique : c'est LÀ qu'est ton blocage, pas dans la droite. Reboucle la gauche seule jusqu'à réussir le test. C'est ennuyeux et c'est le vrai travail.</p>

<p>Ensuite, on ne « libère » pas la droite d'un coup : on la superpose <b>par étapes rythmiques</b>. D'abord elle frappe AVEC la gauche (facile : même geste). Puis sur 2 et 4. Puis moins souvent qu'elle (les blanches). Puis <b>entre</b> ses notes — les contretemps, le niveau qui fabrique tout. Puis une syncope. À chaque étape, ta droite s'éloigne un peu plus du pouls sans jamais le perdre.</p>
<h3>L'arme secrète : la bouche</h3>
<p>Compte <b>à voix haute</b> : « 1 et 2 et 3 et 4 et ». La voix est le chef d'orchestre qui synchronise les deux mains — tous les batteurs apprennent comme ça. Le jour où tu n'en as plus besoin, c'est gagné.</p>

const main=document.getElementById('main');
let curTab='parcours';
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); curTab=b.dataset.tab; Metro.stop(); render();
});
function render(){
  main.innerHTML='';
  if(curTab==='parcours') renderParcours();
  else if(curTab==='dojo') renderDojo();
  else if(curTab==='morceaux') renderMorceaux();
  else renderOutils();
}

/* ---------------- Parcours ---------------- */
function nextLesson(){
  return ALL_LESSONS.find(l=>!S.done[l.id]) || null;
}
function renderParcours(){
  const lv=levelOf(S.xp);
  const pct = lv.next ? Math.round((S.xp-lv.base)/(lv.next[0]-lv.base)*100) : 100;
  const nl=nextLesson();
  const doneCount=Object.keys(S.done).length;
  const hero=document.createElement('div');
  hero.className='card hero';
  hero.innerHTML=`
    <div class="lvl">Grade actuel</div>
    <div class="lvlname">${lv.name}</div>
    <div class="xpbar"><i style="width:${pct}%"></i></div>
    <div class="xptxt">${S.xp} XP${lv.next?` · ${lv.next[0]-S.xp} XP avant « ${lv.next[1]} »`:' · grade maximum'} · ${doneCount}/${ALL_LESSONS.length} leçons · ${S.hist[todayStr()]||0} XP aujourd'hui</div>
    ${nl?`<button class="btn" id="resume">▶ ${doneCount===0?'Commencer':'Reprendre'} : ${nl.title}</button>`
        :'<button class="btn ok" disabled>Parcours terminé — le Dojo t\'attend</button>'}`;
  main.appendChild(hero);
  if(nl) hero.querySelector('#resume').onclick=()=>openLesson(nl);

  const d=ensureDaily();
  const daily=document.createElement('div'); daily.className='card daily';
  daily.innerHTML=`<b style="font-size:15px">📅 Séance du jour · ~15 min</b>`;
  const tasks=[
    ['⚡','Échauffement : sprint de 10 accords', ()=>dojoChords()],
    ['📖', nl ? 'Leçon : '+nl.title : 'Révision : une leçon au hasard',
      ()=>openLesson(nl || ALL_LESSONS[Math.floor(Math.random()*ALL_LESSONS.length)])],
    ['👂','Oreille : une série d\'écoute', ()=>dojoEar()],
  ];
  tasks.forEach(([ic,txt,fn],i)=>{
    const r=document.createElement('div'); r.className='row'+(d.done[i]?' ok':'');
    r.innerHTML=`<div class="st">${d.done[i]?'✓':ic}</div><span>${txt}</span><small style="color:var(--dim)">›</small>`;
    if(!d.done[i]) r.onclick=fn;
    daily.appendChild(r);
  });
  const bn=document.createElement('div'); bn.className='bonus';
  bn.textContent = d.bonus ? '🔥 Séance complète — bonus encaissé.' : 'Les 3 dans la journée = +30 XP bonus.';
  daily.appendChild(bn);
  main.appendChild(daily);

  let unlocked=true;
  CURRICULUM.forEach(mod=>{
    const md=document.createElement('div'); md.className='mod';
    md.innerHTML=`<h2>${mod.title}</h2>`;
    mod.lessons.forEach(l=>{
      const done=!!S.done[l.id];
      const reps=lessonReps(l), p=progOf(l.id), wip=!done && p.n>0;
      const today=palierTakenToday(l.id);
      const el=document.createElement('div');
      el.className='lesson'+(done?' done':'')+(unlocked||done?'':' locked');
      const sub = done ? l.sub
        : wip ? `Palier ${p.n}/${reps}${today?' · repos jusqu\'à demain':' · un palier t\'attend'}`
        : l.sub;
      const right = done ? '✓ '+l.xp
        : wip ? `<span style="color:${today?'var(--dim)':'var(--acc)'}">${p.n}/${reps}</span>`
        : l.xp+' XP';
      el.innerHTML=`<div class="ico">${done?'✓':l.icon}</div>
        <div class="t"><b>${l.title}</b><small>${sub}</small></div>
        <div class="xp">${right}</div>`;
      el.onclick=()=>openLesson(l);
      md.appendChild(el);
      if(!done) unlocked=false;
    });
    main.appendChild(md);
  });
}

/* ---------- générateurs des nouvelles salles ---------- */
function genInvItems(n,types){
  const items=[];
  while(items.length<n){
    const root=Math.floor(Math.random()*12);
    const t=types[Math.floor(Math.random()*types.length)];
    const iv=CHORD_TYPES[t].iv;
    const bass=(root+iv[1+Math.floor(Math.random()*(iv.length-1))])%12;
    items.push({root,t,bass});
  }
  return items;
}
const MAJ_SCALE=[0,2,4,5,7,9,11];
const DEGS=[['I',0,'maj'],['ii',1,'min'],['iii',2,'min'],['IV',3,'maj'],['V',4,'maj'],['vi',5,'min']];
const DEG_KEYS=[0,7,5,2,9,4,10];
function genDegQs(n){
  const qs=[];
  while(qs.length<n){
    const key=DEG_KEYS[Math.floor(Math.random()*DEG_KEYS.length)];
    const scaleStr=MAJ_SCALE.map(s=>NOTE[(key+s)%12]).join(' ');
    if(Math.random()<.65){
      const [dn,dd,dt]=DEGS[1+Math.floor(Math.random()*5)];
      const good=chordName((key+MAJ_SCALE[dd])%12,dt);
      const opts=new Set([good]);
      while(opts.size<3){
        const o=DEGS[1+Math.floor(Math.random()*5)];
        opts.add(chordName((key+MAJ_SCALE[o[1]])%12,o[2]));
      }
      const arr=[...opts].sort(()=>Math.random()-.5);
      qs.push({q:`En ${NOTE[key]} majeur, le degré ${dn} est…`, opts:arr, a:arr.indexOf(good),
        why:`Gamme de ${NOTE[key]} : ${scaleStr}. Le ${dn} est ${good}${dt==='min'?' (minuscule = mineur)':''}.`});
    } else {
      const prog=Math.random()<.5
        ? {n:'I–V–vi–IV',d:[[0,'maj'],[4,'maj'],[5,'min'],[3,'maj']]}
        : {n:'vi–IV–I–V',d:[[5,'min'],[3,'maj'],[0,'maj'],[4,'maj']]};
      const str=k2=>prog.d.map(([di,t])=>chordName((k2+MAJ_SCALE[di])%12,t)).join('–');
      const good=str(key);
      const opts=new Set([good]);
      while(opts.size<3) opts.add(str(DEG_KEYS[Math.floor(Math.random()*DEG_KEYS.length)]));
      const arr=[...opts].sort(()=>Math.random()-.5);
      qs.push({q:`${prog.n} en ${NOTE[key]} majeur donne…`, opts:arr, a:arr.indexOf(good),
        why:`Gamme de ${NOTE[key]} : ${scaleStr}. On compte les degrés dessus → ${good}.`});
    }
  }
  return qs;
}
const VL_KEYS=[0,2,5,7,9];
function vlCycle(key){
  return Math.random()<.5
    ? [{root:key,t:'maj'},{root:(key+5)%12,t:'maj',bass:key},{root:(key+7)%12,t:'maj',bass:(key+11)%12},{root:key,t:'maj'}]
    : [{root:key,t:'maj'},{root:(key+9)%12,t:'min',bass:key},{root:(key+5)%12,t:'maj',bass:key},{root:(key+7)%12,t:'maj',bass:(key+11)%12},{root:key,t:'maj'}];
}
function genScaleEx(){
  if(S.done['m6l2'] && Math.random()<.4){
    const r=[9,4,2][Math.floor(Math.random()*3)];
    return {root:r,pattern:[0,3,5,7,10,12],name:'Penta mineure de '+NOTE[r],sub:'Formule 3-2-2-3-2. Commence dans le grave.'};
  }
  const r=[0,7,5,2,9,10][Math.floor(Math.random()*6)];
  return {root:r,pattern:[0,2,4,5,7,9,11,12],name:NOTE[r]+' majeur',sub:'Formule 2-2-1-2-2-2-1. Commence dans le grave.'};
}

}

    return { xp:S.hist[dt.toISOString().slice(0,10)]||0, lbl:'DLMMJVS'[dt.getDay()] };
  });
  const mx=Math.max(...days.map(d=>d.xp),1);
  c4.innerHTML=`<b style="font-size:16px">📊 Stats</b>
  <div class="statgrid" style="margin-top:10px">
    <div class="stat"><b>${S.xp}</b><small>XP total</small></div>
    <div class="stat"><b>${S.streak}</b><small>jours de suite</small></div>
    <div class="stat"><b>${Object.keys(S.done).length}/${ALL_LESSONS.length}</b><small>leçons validées</small></div>
    <div class="stat"><b>${S.hist[todayStr()]||0}</b><small>XP aujourd'hui</small></div>
    <div class="stat"><b>${Object.keys(S.songs||{}).length}</b><small>morceaux joués</small></div>
    <div class="stat"><b>${S.earBest||'–'}</b><small>record oreille /10</small></div>
    <div class="stat"><b>${S.best.sprint?S.best.sprint+'s':'–'}</b><small>record sprint sans faute</small></div>
    ${S.best.inv?`<div class="stat"><b>${S.best.inv}s</b><small>record renversements</small></div>`:''}
    ${S.best.sev?`<div class="stat"><b>${S.best.sev}s</b><small>record sprint des 7e</small></div>`:''}
  </div>
  <div class="week">${days.map(d=>`<div class="col${d.xp?'':' z'}"><div class="bar" style="height:${Math.max(3,Math.round(d.xp/mx*100))}%"></div><small>${d.lbl}</small></div>`).join('')}</div>
  <div style="text-align:center;font-size:11px;color:var(--dim);margin-top:6px">XP des 7 derniers jours — la régularité se voit ici.</div>`;
  main.appendChild(c4);
}

        else if(palierTakenToday(l.id)){

        } else {

          if(p.n>=reps){

            toast(`🥋 Leçon MAÎTRISÉE · +${l.xp} XP`);
          } else {
            award(15);
            toast(`Palier ${p.n}/${reps} · +15 XP — reviens demain pour le suivant`);
          }
        }
        dailyMark(1);
        if(l.ex.type==='ear') dailyMark(2);
        setTimeout(closeOverlay,600);
      };
      const ex=l.ex;

function toast(msg){

function progDots(el,total,idx,badIdx=new Set()){

/* ---------- moteur : QUIZ ---------- */
function runQuiz(el,ex,cb){
  let i=0, wrong=0;
  const show=()=>{
    const q=ex.qs[i];
    el.innerHTML=`<div class="exhead"><div class="sub">Question ${i+1}/${ex.qs.length}</div>
      <div style="font-size:18px;font-weight:700;margin:8px 0 14px">${q.q}</div></div>`;
    const dots=document.createElement('div'); dots.className='exprog'; el.appendChild(dots);
    progDots(dots,ex.qs.length,i);
    q.opts.forEach((o,oi)=>{
      const b=document.createElement('button'); b.className='quizopt'; b.textContent=o;
      b.onclick=()=>{
        el.querySelectorAll('.quizopt').forEach(x=>x.style.pointerEvents='none');
        if(oi===q.a){ b.classList.add('right'); tada(); }
        else { b.classList.add('wrong'); wrong++; buzz();
          el.querySelectorAll('.quizopt')[q.a].classList.add('right'); }
        const why=document.createElement('div'); why.className='quizwhy'; why.textContent=q.why;
        el.appendChild(why);
        const nx=document.createElement('button'); nx.className='btn';
        nx.textContent= i+1<ex.qs.length ? 'Suivant →' : 'Terminer';
        nx.onclick=()=>{ i++; if(i<ex.qs.length) show(); else finish(); };
        el.appendChild(nx);
      };
      el.appendChild(b);
    });
  };
  const finish=()=>{
    const score=ex.qs.length-wrong;
    if(wrong===0) el.innerHTML=`<div class="exhead"><div class="target">🎯 ${score}/${ex.qs.length}</div><div class="sub">Sans faute. C'est comme ça qu'on travaille.</div></div>`;
    else if(score>=Math.ceil(ex.qs.length*0.6)) el.innerHTML=`<div class="exhead"><div class="target">${score}/${ex.qs.length}</div><div class="sub">Validé — mais relis les explications des erreurs avant de partir.</div></div>`;
    else { el.innerHTML=`<div class="exhead"><div class="target">${score}/${ex.qs.length}</div><div class="sub">Insuffisant. Relis la théorie et reviens : la base doit être solide.</div></div>`;
      const rb=document.createElement('button'); rb.className='btn'; rb.textContent='↻ Recommencer';
      rb.onclick=()=>{ i=0; wrong=0; show(); }; el.appendChild(rb); return; }
    setTimeout(()=>cb(true),1200);
  };
  show();
}

/* ---------- moteur : ACCORDS ---------- */
function genChordItems(gen){
  const items=[]; const used=new Set();
  while(items.length<gen.count){
    const root=gen.roots[Math.floor(Math.random()*gen.roots.length)];
    const t=gen.types[Math.floor(Math.random()*gen.types.length)];
    const k=root+t; if(used.has(k)) continue; used.add(k);
    items.push({root,t});
  }
  return items;
}
function runChord(el,ex,cb){
  const items = ex.items || genChordItems(ex.gen);
  const pass = ex.pass || items.length;
  let i=0, fails=0, score=0, advancing=false; const badIdx=new Set(), failedItems=new Set();
  const sel=new Set();
  el.innerHTML=`<div class="exhead"><div class="target" id="tgt"></div><div class="sub">${ex.sub||''}</div>
    <button class="btn small ghost" id="listen" style="margin-top:8px">🔊 Écouter la cible</button></div>
    <div class="exprog" id="dots"></div><div id="kb"></div>
    <div class="fb" id="fb"></div>
    <div class="exrow"><button class="btn ghost" id="clr">Effacer</button><button class="btn" id="val">Valider</button></div>`;
  el.querySelector('#listen').onclick=()=>{
    const it=items[i]; if(it) playChord(it.hint||voicingFor(it.root,it.t,it.bass),1.6);
  };
  const kb=buildKeyboard(48,72,(m,k)=>{
    if(sel.has(m)){ sel.delete(m); k.classList.remove('sel'); }
    else { sel.add(m); k.classList.add('sel'); playNote(m,.9); }
  });
  el.querySelector('#kb').appendChild(kb);
  const tgt=el.querySelector('#tgt'), fb=el.querySelector('#fb'), dots=el.querySelector('#dots');
  const show=()=>{
    const it=items[i]; sel.clear(); kb.clearSel(); advancing=false;
    tgt.textContent=it.label||chordName(it.root,it.t,it.bass);
    fb.textContent=''; fb.className='fb'; fails=0;
    progDots(dots,items.length,i,badIdx);
  };
  const check=()=>{
    if(advancing) return; /* anti double-validation pendant la fenêtre de succès */
    const it=items[i];
    if(!sel.size){ fb.textContent='Sélectionne des touches d\'abord.'; fb.className='fb bad'; return; }
    const need=(it.iv||CHORD_TYPES[it.t].iv).map(x=>(it.root+x)%12);
    const pcs=[...new Set([...sel].map(m=>m%12))];
    let ok = pcs.length===need.length && need.every(p=>pcs.includes(p));
    if(ok && it.bass!=null) ok = (Math.min(...sel)%12)===it.bass;
    if(ok){
      advancing=true; score++; playChord([...sel]); tada();
      fb.textContent='✓ '+(it.label||chordName(it.root,it.t))+' — '+(it.notesTxt||chordNotes(it.root,it.t)); fb.className='fb ok';
      setTimeout(()=>{ i++; if(i<items.length) show(); else finish(); },900);
    } else {
      fails++; failedItems.add(i);
      buzz(); kb.kbd.classList.add('shake'); setTimeout(()=>kb.kbd.classList.remove('shake'),400);
      if(fails===1) fb.textContent= it.msg1 || (it.bass!=null
        ? '✗ Vérifie les notes ET la basse (note la plus grave = '+NOTE[it.bass]+').'
        : '✗ Recompte : '+(CHORD_TYPES[it.t].iv.length>3?'4 notes.':'majeur = 4+3, mineur = 3+4.'));
      else if(fails===2) fb.textContent='✗ Les notes : '+(it.notesTxt||chordNotes(it.root,it.t));
      else {
        fb.textContent='Regarde les touches bleues, joue-les, et retiens le geste.';
        (it.hint||voicingFor(it.root,it.t,it.bass)).forEach(m=>{ const k=kb.keyEl(m); if(k) k.classList.add('hint'); });
      }
      fb.className='fb bad';
      if(fails>=3) badIdx.add(i);
    }
  };
  el.querySelector('#clr').onclick=()=>{ sel.clear(); kb.clearSel(); };
  el.querySelector('#val').onclick=check;
  const finish=()=>{
    const okPass=score>=pass;
    el.innerHTML=`<div class="exhead"><div class="target">${okPass?'🥋':'👹'} ${score}/${items.length}</div>
      <div class="sub">${okPass ? (score===items.length?'Sans faute. Le dojo est fier.':'Validé. Les accords ratés : refais-les au vrai piano.')
      : 'En dessous de '+pass+'/'+items.length+'. On ne négocie pas avec les fondations : recommence.'}</div></div>`;
    if(!okPass){ const rb=document.createElement('button'); rb.className='btn'; rb.textContent='↻ Recommencer';
      rb.onclick=()=>{ el.innerHTML=''; runChord(el,ex,cb); }; el.appendChild(rb); return; }
    setTimeout(()=>cb(true,score,failedItems.size),1300);
  };
  show();
}

/* ---------- moteur : PROGRESSION ---------- */
function runProg(el,ex,cb){
  const seq=[]; for(let r=0;r<ex.rounds;r++) seq.push(...ex.chords);
  let i=0, fails=0; const sel=new Set();
  el.innerHTML=`<div class="exhead"><div class="sub">${ex.sub||''}</div>
    <button class="btn small ghost" id="demo" style="margin-top:8px">🔊 Écouter la progression</button></div>
    <div class="chips" id="chips"></div><div id="kb"></div>
    <div class="fb" id="fb"></div>
    <div class="exrow"><button class="btn ghost" id="clr">Effacer</button><button class="btn" id="val">Valider</button></div>`;
  el.querySelector('#demo').onclick=()=>{
    ex.chords.forEach((c,ci)=>setTimeout(()=>playChord(voicingFor(c.root,c.t,ex.free?null:c.bass),1.1),ci*950));
  };
  const kb=buildKeyboard(48,72,(m,k)=>{
    if(sel.has(m)){ sel.delete(m); k.classList.remove('sel'); }
    else { sel.add(m); k.classList.add('sel'); playNote(m,.9); }
  });
  el.querySelector('#kb').appendChild(kb);
  const chips=el.querySelector('#chips'), fb=el.querySelector('#fb');
  const draw=()=>{
    chips.innerHTML='';
    seq.forEach((c,ci)=>{
      const s=document.createElement('div');
      s.className='chip'+(ci===i?' cur':ci<i?' done':'');
      s.textContent=chordName(c.root,c.t, ex.free?null:c.bass);
      chips.appendChild(s);
    });
  };
  const show=()=>{ sel.clear(); kb.clearSel(); fb.textContent=''; fb.className='fb'; fails=0; draw(); };
  el.querySelector('#clr').onclick=()=>{ sel.clear(); kb.clearSel(); };
  el.querySelector('#val').onclick=()=>{
    const c=seq[i];
    if(!sel.size){ fb.textContent='Sélectionne des touches d\'abord.'; fb.className='fb bad'; return; }
    const need=CHORD_TYPES[c.t].iv.map(x=>(c.root+x)%12);
    const pcs=[...new Set([...sel].map(m=>m%12))];
    let ok = pcs.length===need.length && need.every(p=>pcs.includes(p));
    if(ok && !ex.free && c.bass!=null) ok=(Math.min(...sel)%12)===c.bass;
    if(ok){
      playChord([...sel]); tada();
      fb.textContent='✓ '+chordName(c.root,c.t); fb.className='fb ok';
      setTimeout(()=>{ i++; if(i<seq.length) show(); else {
        el.innerHTML=`<div class="exhead"><div class="target">🌊</div>
          <div class="sub">Progression bouclée. Maintenant, la vraie version : au piano, en boucle, sans regarder.</div></div>`;
        setTimeout(()=>cb(true),1300);
      }},800);
    } else {
      fails++; buzz(); kb.kbd.classList.add('shake'); setTimeout(()=>kb.kbd.classList.remove('shake'),400);
      fb.textContent= fails>=2 ? '✗ '+chordName(c.root,c.t)+' = '+chordNotes(c.root,c.t)+(!ex.free&&c.bass!=null?' · basse : '+NOTE[c.bass]:'')
        : '✗ Pas ça. Construis-le calmement.';
      fb.className='fb bad';
    }
  };
  show();
}

/* ---------- moteur : GAMME ---------- */
function runScale(el,ex,cb){
  const pcSeq=ex.pattern.map(p=>(ex.root+p)%12);
  let idx=0, startMidi=null, resets=0;
  el.innerHTML=`<div class="exhead"><div class="target">${ex.name}</div><div class="sub">${ex.sub||''}</div></div>
    <div class="exprog" id="dots"></div><div id="kb"></div><div class="fb" id="fb"></div>`;
  const dots=el.querySelector('#dots'), fb=el.querySelector('#fb');
  const kb=buildKeyboard(48,76,(m,k)=>{
    playNote(m,.8);
    if(idx===0 && m%12===pcSeq[0] && m+ex.pattern[ex.pattern.length-1]>76){
      fb.textContent='Bonne note, mais trop haut — le sommet sortirait du clavier. Commence plus grave.';
      fb.className='fb bad'; return;
    }
    const expected = idx===0 ? null : startMidi+ex.pattern[idx];
    const okTap = idx===0 ? (m%12===pcSeq[0]) : (m===expected);
    if(okTap){
      if(idx===0) startMidi=m;
      k.classList.add('flash'); setTimeout(()=>k.classList.remove('flash'),250);
      idx++;
      progDots(dots,ex.pattern.length,idx);
      if(idx>=ex.pattern.length){
        tada();
        fb.textContent='✓ Gamme complète.'; fb.className='fb ok';
        el.querySelectorAll('.key').forEach(x=>x.style.pointerEvents='none');
        setTimeout(()=>{
          el.innerHTML=`<div class="exhead"><div class="target">🪜</div>
          <div class="sub">Bien. Maintenant au vrai piano : la même, mains séparées, avec le bon doigté. Lentement.</div></div>`;
          setTimeout(()=>cb(true),1300);
        },800);
      } else {
        fb.textContent='Note '+(idx+1)+'/'+ex.pattern.length+' — la suivante est à '+(ex.pattern[idx]-ex.pattern[idx-1])+' demi-ton(s).';
        fb.className='fb';
      }
    } else {
      buzz(); resets++;
      idx=0; startMidi=null;
      progDots(dots,ex.pattern.length,0);
      fb.textContent= resets>=3
        ? '✗ On repart du début. Formule : '+ex.pattern.slice(1).map((p,j)=>p-ex.pattern[j]).join('-')
        : '✗ Mauvaise note — on repart de la première.';
      fb.className='fb bad';
    }
  });
  el.querySelector('#kb').appendChild(kb);
  progDots(dots,ex.pattern.length,0);
  fb.textContent='Commence sur '+NOTE[pcSeq[0]]+' ('+NOTE_FR[pcSeq[0]]+').';
}

/* ---------- moteur : OREILLE ---------- */
function runEar(el,ex,cb){
  let i=0, score=0, answered=false, cur=null; const badIdx=new Set();
  const label={maj:'Majeur',min:'Mineur',maj7:'maj7',m7:'m7',dom7:'7'};
  const third={maj:'tierce majeure — brillante (4 demi-tons)', min:'tierce mineure — sombre (3 demi-tons)'};
  el.innerHTML=`<div class="exhead"><div class="target">👂</div><div class="sub">${ex.sub||''}</div></div>
    <div class="exprog" id="dots"></div>
    <div class="exrow"><button class="btn ghost" id="replay">🔊 Réécouter</button><button class="btn ghost" id="arp">🎵 Note par note</button></div>
    <div class="earbtns" id="btns"></div><div class="fb" id="fb"></div>`;
  const dots=el.querySelector('#dots'), fb=el.querySelector('#fb'), btns=el.querySelector('#btns');
  ex.kinds.forEach(k=>{
    const b=document.createElement('button'); b.className='btn ghost'; b.textContent=label[k]; b.dataset.k=k;
    b.onclick=()=>answer(k,b); btns.appendChild(b);
  });
  if(ex.kinds.length===3) btns.style.gridTemplateColumns='1fr 1fr 1fr';
  const notesOf=()=>{ const iv=CHORD_TYPES[cur.t].iv; const use=ex.dyad?[iv[0],iv[1]]:iv; return use.map(x=>cur.rootMidi+x); };
  const playBlock=()=>{ if(cur) playChord(notesOf(),1.8, ex.dyad?0:.03); };
  const playArp=()=>{ if(cur) notesOf().forEach((m,idx)=>playNote(m,.7,.4,idx*.52)); };
  el.querySelector('#replay').onclick=playBlock;
  el.querySelector('#arp').onclick=playArp;
  const play=()=> ex.arp?playArp():playBlock();
  const next=()=>{
    answered=false;
    const root = ex.fixedRoot!=null ? ex.fixedRoot : 52+Math.floor(Math.random()*13);
    cur={ t:ex.kinds[Math.floor(Math.random()*ex.kinds.length)], rootMidi:root };
    fb.textContent=''; fb.className='fb';
    btns.querySelectorAll('.btn').forEach(b=>{ b.classList.remove('ok'); b.style.opacity=1; b.style.pointerEvents='auto'; });
    progDots(dots,ex.count,i,badIdx);
    setTimeout(play,400);
  };
  const answer=(k,b)=>{
    if(answered) return; answered=true;
    btns.querySelectorAll('.btn').forEach(x=>x.style.pointerEvents='none');
    const isTri = cur.t==='maj'||cur.t==='min';
    if(k===cur.t){ score++; b.classList.add('ok'); tada();
      fb.textContent='✓ '+label[cur.t]+(isTri?' · '+third[cur.t]:''); fb.className='fb ok'; }
    else { buzz(); badIdx.add(i);
      fb.textContent='✗ C\'était '+label[cur.t]+(isTri?' — '+third[cur.t]:'')+'. Réécoute :'; fb.className='fb bad';
      btns.querySelector(`[data-k="${cur.t}"]`).classList.add('ok');
      setTimeout(playArp,350); }
    setTimeout(()=>{ i++; if(i<ex.count) next(); else finish(); }, k===cur.t?1200:2200);
  };
  const finish=()=>{
    const okPass=score>=(ex.pass||0);
    el.innerHTML=`<div class="exhead"><div class="target">${okPass?'👂':'😵'} ${score}/${ex.count}</div>
      <div class="sub">${okPass ? 'Ton oreille s\'ouvre. Reviens demain : elle progresse en dormant.'
        : 'En dessous de '+ex.pass+'/'+ex.count+'. Normal au début — réécoute chaque couleur, puis recommence.'}</div></div>`;
    if(score>S.earBest){ S.earBest=score; save(); }
    if(!okPass){ const rb=document.createElement('button'); rb.className='btn'; rb.textContent='↻ Recommencer';
      rb.onclick=()=>{ el.innerHTML=''; runEar(el,ex,cb); }; el.appendChild(rb); return; }
    setTimeout(()=>cb(true,score),1300);
  };
  next();
}

/* ---------- moteur : NOMMER L'ACCORD ---------- */
function runNamer(el,ex,cb){
  let i=0, score=0; const badIdx=new Set();
  el.innerHTML=`<div class="exhead"><div class="target">🕵️</div><div class="sub">${ex.sub||''}</div></div>
    <div class="exprog" id="dots"></div><div id="kb"></div>
    <button class="btn small ghost" id="replay" style="display:block;margin:0 auto">🔊 Réécouter</button>
    <div class="earbtns" id="btns"></div><div class="fb" id="fb"></div>`;
  const kb=buildKeyboard(48,72,m=>playNote(m,.8));
  el.querySelector('#kb').appendChild(kb);
  const dots=el.querySelector('#dots'), fb=el.querySelector('#fb'), btns=el.querySelector('#btns');
  let cur=null;
  const play=()=>{ if(cur) playChord(cur.v,1.5); };
  el.querySelector('#replay').onclick=play;
  const next=()=>{
    kb.clearSel();
    const root=Math.floor(Math.random()*12);
    const t=ex.types[Math.floor(Math.random()*ex.types.length)];
    cur={root,t,v:voicingFor(root,t)};
    cur.v.forEach(m=>{ const k=kb.keyEl(m); if(k) k.classList.add('hint'); });
    const good=chordName(root,t);
    const opts=new Set([good]);
    while(opts.size<4){
      const r2=Math.floor(Math.random()*12), t2=ex.types[Math.floor(Math.random()*ex.types.length)];
      opts.add(chordName(r2,t2));
    }
    btns.innerHTML='';
    [...opts].sort(()=>Math.random()-.5).forEach(o=>{
      const b=document.createElement('button'); b.className='btn ghost'; b.textContent=o;
      b.onclick=()=>{
        btns.querySelectorAll('.btn').forEach(x=>x.style.pointerEvents='none');
        if(o===good){ score++; b.classList.add('ok'); tada(); fb.textContent='✓ Oui : '+chordNotes(root,t); fb.className='fb ok'; }
        else { buzz(); badIdx.add(i); fb.textContent='✗ C\'était '+good+' : '+chordNotes(root,t); fb.className='fb bad';
          [...btns.querySelectorAll('.btn')].find(x=>x.textContent===good).classList.add('ok'); }
        setTimeout(()=>{ i++; if(i<ex.count) next(); else fin(); },1400);
      };
      btns.appendChild(b);
    });
    fb.textContent=''; fb.className='fb';
    progDots(dots,ex.count,i,badIdx);
    setTimeout(play,300);
  };
  const fin=()=>{
    el.innerHTML=`<div class="exhead"><div class="target">🕵️ ${score}/${ex.count}</div>
      <div class="sub">${score===ex.count?'Rien ne t\'échappe.':'Les ratés : reconstruis-les avec la formule, pas de par-cœur.'}</div></div>`;
    setTimeout(()=>cb(true,score),1200);
  };
  next();
}
